<style>

:root{--bg:#0A0E1A;--bg-alt:#0D1220;--panel:rgba(255,255,255,0.045);--panel-solid:#121729;--panel-border:rgba(255,255,255,0.08);--panel-hover:rgba(255,255,255,0.07);--primary:#10B981;--primary-dim:rgba(16,185,129,0.15);--gold:#F0B93F;--gold-dim:rgba(240,185,63,0.15);--danger:#EF4444;--danger-dim:rgba(239,68,68,0.15);--info:#4B9FE1;--info-dim:rgba(75,159,225,0.15);--text:#E7ECF3;--muted:#8B96AB;--muted-dim:#5B6479;--radius:16px;--radius-sm:10px;--shadow:0 8px 32px rgba(0,0,0,0.35);--font-display:'Space Grotesk',sans-serif;--font-body:'Inter',sans-serif;--font-mono:'JetBrains Mono',monospace}

let DB=null;
function defaultDB(){
const now=new Date();const headId='u_head';
return{version:5,simDate:{year:now.getFullYear(),month:now.getMonth()},theme:'dark',displayCurrency:'PLN',currentUserId:headId,fxRates:{...BASE_FX_RATES},familyPool:{balance:2500,history:[]},market:{crypto:CRYPTO_SEED.map(c=>({...c,history:[c.price]})),stocks:STOCKS_SEED.map(s=>({...s,history:[s.price]})),commodities:{gold:{name:'Złoto',price:9850,vol:.012,history:[9850]},oil:{name:'Ropa',price:342,vol:.025,history:[342]}}},jobOffersAvailable:[],globalEventLog:[],notifications:[],users:{[headId]:makeDefaultUser(headId,'Adam Kowalski','A','Głowa rodziny',12500,5000)},standingOrders:[],lastSave:Date.now()};}
function makeDefaultUser(id,name,initials,role,balance,savings){return{id,name,initials,role,balance:savings:savings||1000,savingsRate:.02,creditScore:65,status:'Aktywny',jobs:[],insurances:[],bills:[{id:'b_prad_'+id,name:'Prąd',amount:180,dueDay:10,paid:false,overdueCount:0},{id:'b_woda_'+id,name:'Woda',amount:90,dueDay:12,paid:false,overdueCount:0},{id:'b_internet_'+id,name:'Internet',amount:80,dueDay:15,paid:false,overdueCount:0},{id:'b_czynsz_'+id,name:'Czynsz',amount:1200,dueDay:5,paid:false,overdueCount:0}],portfolio:{crypto:{},stocks:{},realEstate:[],bonds:[],deposits:[],startups:[],ppk:0,goldOz:0,oilBarrels:0},loans:[],achievements:[],goals:[],history:[],overdraftLimit:0,overdraftInterest:.15,lastLogin:Date.now(),totalIncome:0,totalExpenses:0};}
function loadDB(){try{const raw=localStorage.getItem(DB_KEY);if(!raw){DB=defaultDB();saveDB();return DB}DB=JSON.parse(raw);if(!DB.version||DB.version<5){DB=defaultDB();saveDB()}return DB}catch(e){DB=defaultDB();saveDB();return DB}}
function saveDB(){DB.lastSave=Date.now();localStorage.setItem(DB_KEY,JSON.stringify(DB));updateSyncStatus()}
function getUser(id){return DB.users[id||DB.currentUserId]}
function getCurrentUser(){return DB.users[DB.currentUserId]}
function round2(n){return Math.round(n*100)/100}
function convertCurrency(amount,fromCur,toCur){if(fromCur===toCur)return amount;const plnAmount=amount/DB.fxRates[fromCur];return plnAmount*DB.fxRates[toCur]}
function toDisplay(amountInPLN){return convertCurrency(amountInPLN,'PLN',DB.displayCurrency)}
function fmtMoney(amountInPLN,opts){opts=opts||{};const cur=opts.currency||DB.displayCurrency;const val=opts.alreadyConverted?amountInPLN:convertCurrency(amountInPLN,'PLN',cur);const sign=val<0?'-':(opts.forceSign?'+':'');const abs=Math.abs(val);return sign+abs.toLocaleString('pl-PL',{minimumFractionDigits:2,maximumFractionDigits:2})+' '+CURRENCY_SYMBOLS[cur]}
function pushNotification(message,kind){DB.notifications.unshift({id:'n_'+Date.now()+'_'+Math.floor(Math.random()*9999),message,kind:kind||'info',ts:Date.now(),read:false});if(DB.notifications.length>100)DB.notifications.length=100;saveDB()}
function addTransaction(userId,category,amountPLN,note,opts){opts=opts||{};const user=getUser(userId);const meta=CATEGORY_META[category]||CATEGORY_META.inne;const kind=opts.kind||meta.kind;const delta=kind==='expense'?-Math.abs(amountPLN):Math.abs(amountPLN);const target=opts.targetField||'balance';user[target]=round2(user[target]+delta);user.history.unshift({ts:Date.now(),simMonth:DB.simDate.year+'-'+String(DB.simDate.month+1).padStart(2,'0'),category,kind,amountPLN:delta,note:note||meta.label,balanceAfter:user.balance,savingsAfter:user.savings});if(user.history.length>500)user.history.length=500;saveDB();return delta}
function calcNetWorth(user){let total=user.balance+user.savings;Object.entries(user.portfolio.crypto).forEach(([sym,qty])=>{const c=DB.market.crypto.find(x=>x.sym===sym);if(c)total+=c.price*qty});Object.entries(user.portfolio.stocks).forEach(([sym,qty])=>{const s=DB.market.stocks.find(x=>x.sym===sym);if(s)total+=s.price*qty});user.portfolio.realEstate.forEach(p=>total+=p.value-(p.mortgage||0));user.portfolio.bonds.forEach(b=>total+=b.amount);user.portfolio.deposits.forEach(d=>total+=d.amount);user.portfolio.startups.forEach(s=>{if(!s.resolved)total+=s.invested});total+=user.portfolio.ppk;total+=user.portfolio.goldOz*DB.market.commodities.gold.price;total+=user.portfolio.oilBarrels*DB.market.commodities.oil.price;user.loans.forEach(l=>total-=l.remaining);return round2(total)}
function calcFamilyNetWorth(){return round2(Object.values(DB.users).reduce((sum,u)=>sum+calcNetWorth(u),0)+DB.familyPool.balance)}

function syncExport(){
const data=JSON.stringify(DB,null,2);
const blob=new Blob([data],{type:'application/json'});
const url=URL.createObjectURL(blob);
const a=document.createElement('a');
a.href=url;
a.download='apex_bank_sync_'+Date.now()+'.json';
document.body.appendChild(a);
a.click();
document.body.removeChild(a);
URL.revokeObjectURL(url);
showToast('📤 Dane wyeksportowane do pliku', 'success');
}

function syncImport(file){
const reader=new FileReader();
reader.onload=function(e){
try{
const data=JSON.parse(e.target.result);
if(!data.version||!data.users)throw new Error('Niepoprawny format');
DB=data;
saveDB();
updateProfileSelect();
renderAll();
showToast('📥 Dane zaimportowane pomyślnie!', 'success');
}catch(err){
showToast('❌ Błąd importu: '+err.message, 'error');
}
};
reader.readAsText(file);
}

function addFamilyMember(name,initials,role,balance,savings){
const id='u_'+Date.now()+'_'+Math.floor(Math.random()*1000);
const user=makeDefaultUser(id,name,initials,role,balance||5000,savings||1000);
DB.users[id]=user;saveDB();pushNotification('Dodano '+name,'success');return id}
function removeFamilyMember(userId){if(userId==='u_head')return{ok:false,error:'Nie można usunąć głowy'};if(!DB.users[userId])return{ok:false,error:'Nie istnieje'};delete DB.users[userId];saveDB();pushNotification('Usunięto członka','warn');return{ok:true}}
function getFamilyMembers(){return Object.values(DB.users)}
function getFamilyLeaderboard(){return Object.values(DB.users).map(u=>({...u,netWorth:calcNetWorth(u)})).sort((a,b)=>b.netWorth-a.netWorth)}
function transferBetweenUsers(fromId,toId,amountPLN,note){const from=getUser(fromId),to=getUser(toId);if(from.balance<amountPLN)return{ok:false,error:'Niewystarczające'};addTransaction(fromId,'przelew_out',amountPLN,note||'Przelew do '+to.name);addTransaction(toId,'przelew_in',amountPLN,note||'Przelew od '+from.name);saveDB();return{ok:true}}
function transferToFamilyPool(userId,amountPLN,note){const user=getUser(userId);if(user.balance<amountPLN)return{ok:false,error:'Niewystarczające'};addTransaction(userId,'przelew_out',amountPLN,note||'Do puli');DB.familyPool.balance=round2(DB.familyPool.balance+amountPLN);DB.familyPool.history.unshift({ts:Date.now(),userId,amountPLN,note:note||'Wpłata'});saveDB();return{ok:true}}
function withdrawFromFamilyPool(userId,amountPLN,note){if(DB.familyPool.balance<amountPLN)return{ok:false,error:'Za mało w puli'};DB.familyPool.balance=round2(DB.familyPool.balance-amountPLN);addTransaction(userId,'przelew_in',amountPLN,note||'Z puli');DB.familyPool.history.unshift({ts:Date.now(),userId,amountPLN:-amountPLN,note:note||'Wypłata'});saveDB();return{ok:true}}
function refreshJobOffers(){const count=6+Math.floor(Math.random()*5);const shuffled=[...JOB_OFFERS_POOL].sort(()=>Math.random()-0.5);DB.jobOffersAvailable=shuffled.slice(0,count).map(j=>({...j,id:j.id+'_'+Date.now()+'_'+Math.floor(Math.random()*1000),expires:Date.now()+7*24*60*60*1000}));saveDB();return DB.jobOffersAvailable}
function applyForJob(userId,jobId){const user=getUser(userId);const job=DB.jobOffersAvailable.find(j=>j.id===jobId);if(!job)return{ok:false,error:'Oferta wygasła'};const success=Math.random()<(job.successBase+user.creditScore/200);DB.jobOffersAvailable=DB.jobOffersAvailable.filter(j=>j.id!==jobId);if(success){user.jobs.push({id:'j_'+Date.now(),title:job.title,salary:job.salary,sector:job.sector,startMonth:DB.simDate.year+'-'+String(DB.simDate.month+1).padStart(2,'0'),active:true});pushNotification('🎉 Rozpocząłeś '+job.title,'success');saveDB();return{ok:true,message:'Zdobyto pracę',job:job}}else{pushNotification('❌ Nie udało się '+job.title,'error');saveDB();return{ok:false,message:'Nie udało się'}}}
function collectSalary(userId){const user=getUser(userId);let total=0;user.jobs.forEach(job=>{if(job.active){const net=job.salary*(1-0.12);total+=net;addTransaction(userId,'wyplata',net,'Wypłata: '+job.title)}});if(total>0){pushNotification('💵 Wypłaty: '+fmtMoney(total),'success');saveDB()}return total}
function updateMarketPrices(){DB.market.crypto.forEach(c=>{const change=(Math.random()-0.5)*c.vol*2;c.price=Math.max(.01,c.price*(1+change));c.history.push(c.price);if(c.history.length>100)c.history.shift()});DB.market.stocks.forEach(s=>{const change=(Math.random()-0.5)*s.vol*2;s.price=Math.max(.01,s.price*(1+change));s.history.push(s.price);if(s.history.length>100)s.history.shift()});['gold','oil'].forEach(key=>{const item=DB.market.commodities[key];const change=(Math.random()-0.5)*item.vol*2;item.price=Math.max(.01,item.price*(1+change));item.history.push(item.price);if(item.history.length>100)item.history.shift()});Object.keys(DB.fxRates).forEach(cur=>{if(cur==='PLN')return;const drift=(Math.random()-.5)*.01;DB.fxRates[cur]=Math.max(BASE_FX_RATES[cur]*.85,Math.min(BASE_FX_RATES[cur]*1.15,DB.fxRates[cur]*(1+drift)))});saveDB()}
function buyCrypto(userId,symbol,quantity){const user=getUser(userId);const asset=DB.market.crypto.find(c=>c.sym===symbol);if(!asset)return{ok:false,error:'Nieznana'};const cost=asset.price*quantity;if(user.balance<cost)return{ok:false,error:'Za mało środków'};user.balance=round2(user.balance-cost);user.portfolio.crypto[symbol]=(user.portfolio.crypto[symbol]||0)+quantity;addTransaction(userId,'inwestycja',cost,'Zakup '+quantity+' '+symbol);pushNotification('📈 Zakupiono '+quantity+' '+symbol,'info');saveDB();return{ok:true,cost:cost}}
function sellCrypto(userId,symbol,quantity){const user=getUser(userId);const asset=DB.market.crypto.find(c=>c.sym===symbol);if(!asset)return{ok:false,error:'Nieznana'};const held=user.portfolio.crypto[symbol]||0;if(held<quantity)return{ok:false,error:'Za mało'};const revenue=asset.price*quantity;user.balance=round2(user.balance+revenue);user.portfolio.crypto[symbol]=held-quantity;if(user.portfolio.crypto[symbol]===0)delete user.portfolio.crypto[symbol];addTransaction(userId,'sprzedaz',revenue,'Sprzedaż '+quantity+' '+symbol);pushNotification('💰 Sprzedano '+quantity+' '+symbol,'info');saveDB();return{ok:true,revenue:revenue}}
function buyStock(userId,symbol,quantity){const user=getUser(userId);const asset=DB.market.stocks.find(s=>s.sym===symbol);if(!asset)return{ok:false,error:'Nieznana'};const cost=asset.price*quantity;if(user.balance<cost)return{ok:false,error:'Za mało'};user.balance=round2(user.balance-cost);user.portfolio.stocks[symbol]=(user.portfolio.stocks[symbol]||0)+quantity;addTransaction(userId,'inwestycja',cost,'Zakup '+quantity+' '+symbol);pushNotification('📊 Zakupiono '+quantity+' '+symbol,'info');saveDB();return{ok:true,cost:cost}}
function sellStock(userId,symbol,quantity){const user=getUser(userId);const asset=DB.market.stocks.find(s=>s.sym===symbol);if(!asset)return{ok:false,error:'Nieznana'};const held=user.portfolio.stocks[symbol]||0;if(held<quantity)return{ok:false,error:'Za mało'};const revenue=asset.price*quantity;user.balance=round2(user.balance+revenue);user.portfolio.stocks[symbol]=held-quantity;if(user.portfolio.stocks[symbol]===0)delete user.portfolio.stocks[symbol];addTransaction(userId,'sprzedaz',revenue,'Sprzedaż '+quantity+' '+symbol);pushNotification('💰 Sprzedano '+quantity+' '+symbol,'info');saveDB();return{ok:true,revenue:revenue}}
function collectDividends(userId){const user=getUser(userId);let total=0;Object.entries(user.portfolio.stocks).forEach(([sym,qty])=>{const asset=DB.market.stocks.find(s=>s.sym===sym);if(asset){const div=asset.price*.005*qty;if(div>.01){total+=div;addTransaction(userId,'dywidenda',div,'Dywidenda z '+sym)}}});if(total>0){pushNotification('💵 Dywidendy: '+fmtMoney(total),'success');saveDB()}return total}
function buyCommodity(userId,type,quantity){const user=getUser(userId);const asset=DB.market.commodities[type];if(!asset)return{ok:false,error:'Nieznany'};const cost=asset.price*quantity;if(user.balance<cost)return{ok:false,error:'Za mało'};user.balance=round2(user.balance-cost);if(type==='gold')user.portfolio.goldOz+=quantity;else user.portfolio.oilBarrels+=quantity;addTransaction(userId,'inwestycja',cost,'Zakup '+quantity+' '+asset.name);pushNotification('🛢️ Zakupiono '+quantity+' '+asset.name,'info');saveDB();return{ok:true,cost:cost}}
function payBill(userId,billId){const user=getUser(userId);const bill=user.bills.find(b=>b.id===billId);if(!bill)return{ok:false,error:'Nie istnieje'};if(bill.paid)return{ok:false,error:'Już opłacony'};if(user.balance<bill.amount)return{ok:false,error:'Za mało'};user.balance=round2(user.balance-bill.amount);bill.paid=true;addTransaction(userId,'rachunki',bill.amount,'Opłata: '+bill.name);pushNotification('✅ Opłacono '+bill.name,'success');saveDB();return{ok:true}}
function takeLoan(userId,amount,rate,months){const user=getUser(userId);const maxLoan=user.balance*3+user.savings*.5;if(amount>maxLoan)return{ok:false,error:'Przekroczono zdolność'};const monthlyRate=rate/12;const monthlyPayment=amount*monthlyRate*Math.pow(1+monthlyRate,months)/(Math.pow(1+monthlyRate,months)-1);const id='loan_'+Date.now();user.loans.push({id,type:'gotówkowy',principal:amount,remaining:amount,rate,months,monthlyPayment,startMonth:DB.simDate.year+'-'+String(DB.simDate.month+1).padStart(2,'0')});user.balance=round2(user.balance+amount);addTransaction(userId,'przelew_in',amount,'Kredyt '+months+'m '+Math.round(rate*100)+'%');pushNotification('🏦 Kredyt: '+fmtMoney(amount),'info');saveDB();return{ok:true,monthlyPayment:monthlyPayment}}
function addGoal(userId,name,target,deadlineMonth){const user=getUser(userId);user.goals.push({id:'goal_'+Date.now(),name,target,current:0,deadlineMonth:deadlineMonth||12,startMonth:DB.simDate.year+'-'+String(DB.simDate.month+1).padStart(2,'0'),completed:false});pushNotification('🎯 Nowy cel: '+name,'info');saveDB();return{ok:true}}
function contributeToGoal(userId,goalId,amount){const user=getUser(userId);const goal=user.goals.find(g=>g.id===goalId);if(!goal)return{ok:false,error:'Nie istnieje'};if(goal.completed)return{ok:false,error:'Już osiągnięty'};if(user.balance<amount)return{ok:false,error:'Za mało'};user.balance=round2(user.balance-amount);goal.current=round2(goal.current+amount);addTransaction(userId,'inne',amount,'Cel: '+goal.name);pushNotification('💰 Wpłacono '+fmtMoney(amount)+' na '+goal.name,'info');if(goal.current>=goal.target){goal.completed=true;pushNotification('🏆 Osiągnięto cel: '+goal.name+'!','success');user.creditScore=Math.min(100,user.creditScore+10);user.achievements.push({id:'ach_'+Date.now(),name:'Osiągnięto cel: '+goal.name,date:Date.now(),icon:'🎯'})}saveDB();return{ok:true}}
function checkAchievements(userId){const user=getUser(userId);const newAchs=[];const has=(n)=>user.achievements.some(a=>a.name===n);const nw=calcNetWorth(user);if(nw>=100000&&!has('Milioner w budowie'))newAchs.push({name:'Milioner w budowie',icon:'💎'});if(nw>=1000000&&!has('Milioner'))newAchs.push({name:'Milioner',icon:'👑'});if(user.jobs.filter(j=>j.active).length>=3&&!has('Pracowity'))newAchs.push({name:'Pracowity',icon:'💼'});if(user.savings>=50000&&!has('Oszczędny'))newAchs.push({name:'Oszczędny',icon:'🐷'});if(user.creditScore>=90&&!has('Wiarygodny'))newAchs.push({name:'Wiarygodny',icon:'⭐'});if(Object.keys(user.portfolio.crypto).length>=5&&!has('Krypto-ekspert'))newAchs.push({name:'Krypto-ekspert',icon:'₿'});if(user.loans.length===0&&user.balance>0&&!has('Bez długów'))newAchs.push({name:'Bez długów',icon:'🎉'});newAchs.forEach(a=>{user.achievements.push({id:'ach_'+Date.now()+'_'+Math.floor(Math.random()*1000),name:a.name,icon:a.icon,date:Date.now()});pushNotification('🏆 Nowe osiągnięcie: '+a.icon+' '+a.name,'success')});if(newAchs.length>0)saveDB();return newAchs}
function getFinancialHealth(userId){const user=getUser(userId);const nw=calcNetWorth(user);const debt=user.loans.reduce((s,l)=>s+l.remaining,0);const liquidity=user.balance/(debt+.01);const score=user.creditScore;let health=50+Math.min(30,nw/10000)*.3+Math.min(20,liquidity*5)+score*.3;return Math.max(0,Math.min(100,Math.round(health)))}
function getMonthlyCashflow(userId){const user=getUser(userId);let income=0,expenses=0;user.jobs.forEach(j=>{if(j.active)income+=j.salary*(1-.12)});user.portfolio.realEstate.forEach(p=>income+=p.rent);user.bills.forEach(b=>expenses+=b.amount);user.loans.forEach(l=>{if(l.remaining>0)expenses+=l.monthlyPayment});user.insurances.forEach(i=>{if(i.active)expenses+=i.monthlyCost});return{income:round2(income),expenses:round2(expenses),net:round2(income-expenses)}}
function advanceMonth(){DB.simDate.month++;if(DB.simDate.month>11){DB.simDate.month=0;DB.simDate.year++}Object.keys(DB.users).forEach(uid=>{collectSalary(uid);processMonthlyBills(uid);processLoanPayment(uid);collectDividends(uid);collectRent(uid);const user=getUser(uid);const interest=user.savings*user.savingsRate;if(interest>.01){user.savings=round2(user.savings+interest);addTransaction(uid,'odsetki',interest,'Odsetki od oszczędności')}checkAchievements(uid)});updateMarketPrices();refreshJobOffers();saveDB();pushNotification('📅 Miesiąc '+ (DB.simDate.month+1)+'/'+DB.simDate.year,'info');renderAll()}
function processMonthlyBills(userId){const user=getUser(userId);user.bills.forEach(bill=>{if(!bill.paid){bill.overdueCount=(bill.overdueCount||0)+1;const penalty=bill.amount*.05*bill.overdueCount;if(user.balance>=penalty){user.balance=round2(user.balance-penalty);addTransaction(userId,'kara',penalty,'Kara: '+bill.name)}user.creditScore=Math.max(0,user.creditScore-2)}bill.paid=false});saveDB()}
function processLoanPayment(userId){const user=getUser(userId);user.loans.forEach(loan=>{if(loan.remaining>0){const payment=Math.min(loan.monthlyPayment,loan.remaining);if(user.balance>=payment){user.balance=round2(user.balance-payment);loan.remaining=round2(loan.remaining-payment);addTransaction(userId,'kredyt_rata',payment,'Rata kredytu');if(loan.remaining<=0){pushNotification('✅ Kredyt spłacony!','success');user.creditScore=Math.min(100,user.creditScore+5)}}else{user.creditScore=Math.max(0,user.creditScore-3)}}});saveDB()}
function collectRent(userId){const user=getUser(userId);let total=0;user.portfolio.realEstate.forEach(p=>{total+=p.rent;addTransaction(userId,'czynsz_najem',p.rent,'Czynsz: '+p.name)});if(total>0){pushNotification('🏠 Czynsze: '+fmtMoney(total),'success');saveDB()}return total}
function buyInsurance(userId,type,monthlyCost,coverage){const user=getUser(userId);if(user.balance<monthlyCost)return{ok:false,error:'Za mało'};user.balance=round2(user.balance-monthlyCost);const id='ins_'+Date.now();user.insurances.push({id,type,monthlyCost,coverage,startMonth:DB.simDate.year+'-'+String(DB.simDate.month+1).padStart(2,'0'),active:true});addTransaction(userId,'ubezpieczenie',monthlyCost,'Ubezpieczenie: '+type);pushNotification('🛡️ Wykupiono '+type,'success');saveDB();return{ok:true}}
function processMonthlyInsurance(userId){const user=getUser(userId);user.insurances.forEach(ins=>{if(ins.active){if(user.balance>=ins.monthlyCost){user.balance=round2(user.balance-ins.monthlyCost);addTransaction(userId,'ubezpieczenie',ins.monthlyCost,'Składka: '+ins.type)}else{ins.active=false;pushNotification('⚠️ Anulowano '+ins.type,'error')}}});saveDB()}
function buyRealEstate(userId,name,value,rent){const user=getUser(userId);if(user.balance<value)return{ok:false,error:'Za mało'};const p={id:'re_'+Date.now(),name,value,rent:rent||value*.005,mortgage:0,purchasedMonth:DB.simDate.year+'-'+String(DB.simDate.month+1).padStart(2,'0'),maintenance:value*.001};user.balance=round2(user.balance-value);user.portfolio.realEstate.push(p);addTransaction(userId,'inwestycja',value,'Zakup nieruchomości: '+name);pushNotification('🏠 Zakupiono '+name,'success');saveDB();return{ok:true,property:p}}
function sellRealEstate(userId,propertyId){const user=getUser(userId);const idx=user.portfolio.realEstate.findIndex(p=>p.id===propertyId);if(idx===-1)return{ok:false,error:'Nie istnieje'};const p=user.portfolio.realEstate[idx];const price=p.value*(.9+Math.random()*.2);user.balance=round2(user.balance+price);user.portfolio.realEstate.splice(idx,1);addTransaction(userId,'sprzedaz',price,'Sprzedaż: '+p.name);pushNotification('💰 Sprzedano '+p.name+' za '+fmtMoney(price),'info');saveDB();return{ok:true,salePrice:price}}
function buyBond(userId,amount,rate,months){const user=getUser(userId);if(user.balance<amount)return{ok:false,error:'Za mało'};const bond={id:'bond_'+Date.now(),amount,rate,months,startMonth:DB.simDate.year+'-'+String(DB.simDate.month+1).padStart(2,'0'),interestAccrued:0};user.balance=round2(user.balance-amount);user.portfolio.bonds.push(bond);addTransaction(userId,'inwestycja',amount,'Obligacja '+Math.round(rate*100)+'%');pushNotification('📊 Obligacja: '+fmtMoney(amount),'info');saveDB();return{ok:true,bond:bond}}
function processBondInterest(userId){const user=getUser(userId);user.portfolio.bonds.forEach(bond=>{const interest=bond.amount*(bond.rate/12);bond.interestAccrued=(bond.interestAccrued||0)+interest;const monthsPassed=Math.floor((Date.now()-new Date(bond.startMonth).getTime())/(30*24*60*60*1000));if(monthsPassed>=bond.months){const total=bond.amount+bond.interestAccrued;user.balance=round2(user.balance+total);addTransaction(userId,'odsetki',total,'Wykup obligacji');pushNotification('💰 Wykupiono obligację: '+fmtMoney(total),'success');const idx=user.portfolio.bonds.indexOf(bond);if(idx>-1)user.portfolio.bonds.splice(idx,1)}});saveDB()}
function createDeposit(userId,amount,rate,months){const user=getUser(userId);if(user.balance<amount)return{ok:false,error:'Za mało'};const dep={id:'dep_'+Date.now(),amount,rate,months,startMonth:DB.simDate.year+'-'+String(DB.simDate.month+1).padStart(2,'0'),interestAccrued:0};user.balance=round2(user.balance-amount);user.portfolio.deposits.push(dep);addTransaction(userId,'inwestycja',amount,'Lokata '+Math.round(rate*100)+'%');pushNotification('🏦 Lokata: '+fmtMoney(amount),'info');saveDB();return{ok:true,deposit:dep}}
function processDepositInterest(userId){const user=getUser(userId);user.portfolio.deposits.forEach(dep=>{const interest=dep.amount*(dep.rate/12);dep.interestAccrued=(dep.interestAccrued||0)+interest;const monthsPassed=Math.floor((Date.now()-new Date(dep.startMonth).getTime())/(30*24*60*60*1000));if(monthsPassed>=dep.months){const total=dep.amount+dep.interestAccrued;user.balance=round2(user.balance+total);addTransaction(userId,'odsetki',total,'Wypłata lokaty');pushNotification('💰 Wypłacono lokatę: '+fmtMoney(total),'success');const idx=user.portfolio.deposits.indexOf(dep);if(idx>-1)user.portfolio.deposits.splice(idx,1)}});saveDB()}
function investInStartup(userId,name,amount,risk){const user=getUser(userId);if(user.balance<amount)return{ok:false,error:'Za mało'};const s={id:'startup_'+Date.now(),name,invested:amount,risk:risk||.5,startMonth:DB.simDate.year+'-'+String(DB.simDate.month+1).padStart(2,'0'),resolved:false,result:null};user.balance=round2(user.balance-amount);user.portfolio.startups.push(s);addTransaction(userId,'inwestycja',amount,'Startup: '+name);pushNotification('🚀 Startup: '+name,'info');saveDB();return{ok:true,startup:s}}
function processStartups(userId){const user=getUser(userId);user.portfolio.startups.forEach(startup=>{if(startup.resolved)return;const monthsPassed=Math.floor((Date.now()-new Date(startup.startMonth).getTime())/(30*24*60*60*1000));if(monthsPassed>=12){startup.resolved=true;const success=Math.random()<(1-startup.risk);if(success){const mult=1.5+Math.random()*3;const ret=startup.invested*mult;user.balance=round2(user.balance+ret);addTransaction(userId,'sprzedaz',ret,'Zwrot z startupu: '+startup.name);pushNotification('💰 Startup '+startup.name+' wypalił!','success');startup.result='success'}else{pushNotification('💥 Startup '+startup.name+' upadł','error');startup.result='failure'}}});saveDB()}
function contributeToPPK(userId,amount){const user=getUser(userId);if(user.balance<amount)return{ok:false,error:'Za mało'};const gov=Math.min(amount*.5,250);const total=amount+gov;user.balance=round2(user.balance-amount);user.portfolio.ppk=(user.portfolio.ppk||0)+total;addTransaction(userId,'inne',amount,'PPK (+dopłata '+fmtMoney(gov)+')');pushNotification('🏦 PPK: '+fmtMoney(amount)+' + '+fmtMoney(gov),'success');saveDB();return{ok:true,total:total,governmentMatch:gov}}
function setupOverdraft(userId,limit){const user=getUser(userId);if(limit<0||limit>10000)return{ok:false,error:'Limit 0-10000'};user.overdraftLimit=limit;saveDB();pushNotification('💳 Limit debetu: '+fmtMoney(limit),'info');return{ok:true,limit:limit}}

function init(){
loadDB();
if(!DB.users['u_blank']){const b=makeDefaultUser('u_blank','Blanka Kowalska','B','Małżonka',8500,3000);DB.users['u_blank']=b}
if(!DB.users['u_karol']){const k=makeDefaultUser('u_karol','Karol Nowak','K','Syn',3500,500);k.jobs=[{id:'j_karol_1',title:'Korepetytor',salary:1200,sector:'Edukacja',startMonth:DB.simDate.year+'-'+String(DB.simDate.month+1).padStart(2,'0'),active:true}];DB.users['u_karol']=k}
refreshJobOffers();updateMarketPrices();saveDB();
document.getElementById('currencySelect').value=DB.displayCurrency;
document.getElementById('currencySelect').addEventListener('change',function(){DB.displayCurrency=this.value;saveDB();renderAll()});
document.getElementById('profileSelect').addEventListener('change',function(){switchProfile(this.value)});
document.getElementById('themeToggleBtn').addEventListener('click',function(){document.body.classList.toggle('light-mode');const l=document.body.classList.contains('light-mode');DB.theme=l?'light':'dark';saveDB();this.textContent=l?'☀️':'🌙';showToast(l?'☀️ Jasny':'🌙 Ciemny','info')});
document.getElementById('advanceMonthBtn').addEventListener('click',function(){advanceMonth()});
document.getElementById('notifBtn').addEventListener('click',function(){const unread=DB.notifications.filter(n=>!n.read).length;let html='<div class="modal-title">🔔 Powiadomienia</div>';if(DB.notifications.length===0){html+='<div class="text-muted text-center" style="padding:20px">Brak</div>'}else{DB.notifications.slice(0,30).forEach(n=>{html+='<div style="padding:6px 0;border-bottom:1px solid var(--panel-border)">'+(n.kind==='success'?'✅':n.kind==='error'?'❌':n.kind==='warn'?'⚠️':'ℹ️')+' '+n.message+'<div style="font-size:10px;color:var(--muted)">'+new Date(n.ts).toLocaleString('pl-PL')+'</div></div>';n.read=true});document.getElementById('notifDot').style.display='none';saveDB()}showModal(html)});
document.getElementById('modalClose').addEventListener('click',closeModal);
document.getElementById('modalOverlay').addEventListener('click',function(e){if(e.target===this)closeModal()});
document.getElementById('collapseBtn').addEventListener('click',function(){document.getElementById('sidebar').classList.toggle('collapsed');this.innerHTML=document.getElementById('sidebar').classList.contains('collapsed')?'▶ Rozwiń':'◀ Zwiń'});
document.getElementById('syncExportBtn').addEventListener('click',syncQR);
document.getElementById('mobileMenuBtn').addEventListener('click',function(){document.getElementById('sidebar').classList.toggle('open');this.textContent=document.getElementById('sidebar').classList.contains('open')?'✕':'☰'});
document.addEventListener('click',function(e){const s=document.getElementById('sidebar');const b=document.getElementById('mobileMenuBtn');if(s.classList.contains('open')&&!s.contains(e.target)&&e.target!==b){s.classList.remove('open');b.textContent='☰'}});
const bottomNav=document.querySelectorAll('.mobile-bottom-nav .nav-item');const sideNav=document.querySelectorAll('.sidebar .nav-item');
bottomNav.forEach(item=>{item.addEventListener('click',function(){const view=this.dataset.view;bottomNav.forEach(n=>n.classList.remove('active'));sideNav.forEach(n=>n.classList.remove('active'));this.classList.add('active');sideNav.forEach(n=>{if(n.dataset.view===view)n.classList.add('active')});switch(view){case'dashboard':renderAll();break;case'family':renderFamilyView();break;case'transactions':renderTransactionsView();break;case'investments':renderInvestmentsView();break;case'market':renderMarketView();break;case'loans':renderLoansView();break;case'insurance':renderInsuranceView();break;case'bills':renderBillsView();break;case'goals':renderGoalsView();break;case'achievements':renderAchievementsView();break;case'settings':renderSettingsView();break;default:renderAll()};if(window.innerWidth<=768&&document.getElementById('sidebar').classList.contains('open')){document.getElementById('sidebar').classList.remove('open');document.getElementById('mobileMenuBtn').textContent='☰'}})});
sideNav.forEach(item=>{item.addEventListener('click',function(){const view=this.dataset.view;bottomNav.forEach(n=>{n.classList.toggle('active',n.dataset.view===view)})})});
if(DB.theme==='light'){document.body.classList.add('light-mode');document.getElementById('themeToggleBtn').textContent='☀️'}
const avatar=document.getElementById('topAvatar');const user=getCurrentUser();if(user)avatar.textContent=user.initials;
updateProfileSelect();renderAll();showToast('🚀 Apex Bank Pro v5.0 gotowy!','success');
const unreadNotif=DB.notifications.filter(n=>!n.read).length;if(unreadNotif>0)document.getElementById('notifDot').style.display='block';
updateSyncStatus();
console.log('✅ Apex Bank Pro v5.0 – ZSYNCHRONIZOWANY!');
}

document.addEventListener('DOMContentLoaded',init);

      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      this.classList.add('active');
      renderTutorialView();
    });
    settingsItem.parentNode.insertBefore(newItem, settingsItem);
  }
}

// ===== DODANIE DO MOBILNEJ NAWIGACJI =====
function addTutorialMobileNav(){
  const bottomNav = document.getElementById('mobileBottomNav');
  if(!bottomNav) return;
  
  const newItem = document.createElement('div');
  newItem.className = 'nav-item';
  newItem.dataset.view = 'tutorial';
  newItem.innerHTML = '<span class="nav-icon">📖</span><span>Poradnik</span>';
  newItem.addEventListener('click', function(){
    const allItems = document.querySelectorAll('.mobile-bottom-nav .nav-item, .sidebar .nav-item');
    allItems.forEach(n => n.classList.remove('active'));
    this.classList.add('active');
    // Zaznacz też w sidebarze
    document.querySelectorAll('.sidebar .nav-item').forEach(n => {
      if(n.dataset.view === 'tutorial') n.classList.add('active');
    });
    renderTutorialView();
  });
  
  // Wstaw przed ostatnim
  const lastItem = bottomNav.lastElementChild;
  bottomNav.insertBefore(newItem, lastItem);
}

// ===== NADPISANIE INICJALIZACJI =====
const originalAddExtraNav = window.addExtraNav || function(){};
window.addExtraNav = function(){
  originalAddExtraNav();
  addTutorialNav();
  addTutorialMobileNav();
};

// Uruchom po załadowaniu
document.addEventListener('DOMContentLoaded', function(){
  setTimeout(function(){
    addTutorialNav();
    addTutorialMobileNav();
  }, 100);
});

console.log('📖 Samouczek dodany!');
</script>
</body>
</html>
