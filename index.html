<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>Tablica Taktyczna Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            touch-action: none;
            overflow: hidden;
        }

        /* Pasek narzędzi */
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
            max-width: 800px;
            margin-bottom: 10px;
            z-index: 100;
        }

        button {
            background-color: #1e293b;
            color: white;
            border: 1px solid #475569;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
        }
        button.active { background-color: #2563eb; border-color: #3b82f6; }
        .btn-danger { background-color: #991b1b; }

        /* Sztywny kontener boiska 16:9 */
        .pitch-wrapper {
            width: 100%;
            max-width: 800px;
            aspect-ratio: 16 / 10; /* Idealne proporcje piłkarskie */
            position: relative;
            box-sizing: border-box;
        }

        .pitch-container {
            width: 100%;
            height: 100%;
            background-color: #2e6f40;
            border: 4px solid #ffffff;
            position: relative;
            overflow: hidden;
            border-radius: 4px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        /* Warstwy SVG do linii boiska i rysowania */
        .pitch-svg, #drawing-svg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
        }
        .pitch-svg stroke { stroke: rgba(255,255,255,0.8); stroke-width: 2; fill: none; }

        /* Strefa 14 */
        .zone-14 {
            position: absolute;
            left: 65%; top: 25%; width: 20%; height: 50%;
            border: 3px dashed #ef4444;
            background-color: rgba(239, 68, 68, 0.15);
            display: none;
            pointer-events: none;
            z-index: 5;
        }

        /* Warstwa na obiekty */
        .elements-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 20;
            pointer-events: none;
        }

        /* Tokeny zawodników i piłka */
        .draggable {
            position: absolute;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 12px;
            font-weight: bold;
            color: white;
            border: 2px solid white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.4);
            cursor: move;
            transform: translate(-50%, -50%);
            pointer-events: auto;
            user-select: none;
            touch-action: none;
        }
        .team-blue { background-color: #1d4ed8; }
        .team-red { background-color: #b91c1c; }
        
        .ball {
            width: 18px; height: 18px;
            background-color: #ffffff;
            border: 2px solid #000000;
            z-index: 40;
        }
        .ball::after {
            content: ''; width: 100%; height: 100%;
            background: repeating-linear-gradient(45deg, transparent, transparent 3px, #000 3px, #000 6px);
            border-radius: 50%; opacity: 0.2;
        }
    </style>
</head>
<body>

    <div class="toolbar">
        <button onclick="setTool('draw', this)">✏️ Linie</button>
        <button onclick="setTool('run', this)">➖ Biegi</button>
        <button onclick="setTool('arrow', this)">↗️ Strzałki</button>
        <button style="border-bottom: 3px solid #3b82f6;" onclick="setColor('#3b82f6')">Niebieski</button>
        <button style="border-bottom: 3px solid #ef4444;" onclick="setColor('#ef4444')">Czerwony</button>
        <button style="border-bottom: 3px solid #ffffff;" onclick="setColor('#ffffff')">Biały</button>
        <button onclick="spawnTeam('blue')">🔵 +11 Niebieskich</button>
        <button onclick="spawnTeam('red')">🔴 +11 Czerwonych</button>
        <button onclick="spawnBall()">⚽ Piłka</button>
        <button onclick="toggleZone14()">Strefa 14</button>
        <button onclick="clearLines()">🧹 Linie</button>
        <button class="btn-danger" onclick="clearAll()">⚠️ Reset</button>
        <button style="background-color: #16a34a;" onclick="downloadBoard()">📸 Pobierz PNG</button>
    </div>

    <div class="pitch-wrapper">
        <div class="pitch-container" id="tactical-board">
            <svg class="pitch-svg" viewBox="0 0 100 62.5" preserveAspectRatio="none">
                <rect x="0.5" y="0.5" width="99" height="61.5" fill="none" stroke="white" stroke-width="0.5"/>
                <line x1="50" y1="0.5" x2="50" y2="62" stroke="white" stroke-width="0.5"/>
                <circle cx="50" cy="31.25" r="9.15" fill="none" stroke="white" stroke-width="0.5"/>
                <rect x="0.5" y="13.125" width="16.5" height="36.25" fill="none" stroke="white" stroke-width="0.5"/>
                <rect x="0.5" y="22.25" width="5.5" height="18" fill="none" stroke="white" stroke-width="0.5"/>
                <rect x="83" y="13.125" width="16.5" height="36.25" fill="none" stroke="white" stroke-width="0.5"/>
                <rect x="94" y="22.25" width="5.5" height="18" fill="none" stroke="white" stroke-width="0.5"/>
            </svg>

            <svg id="drawing-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
                <defs>
                    <marker id="arrowhead" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                        <path d="M 0 0 L 10 5 L 0 10 z" fill="context-stroke" />
                    </marker>
                </defs>
            </svg>

            <div id="z14" class="zone-14"></div>

            <div class="elements-layer" id="elements-container"></div>
        </div>
    </div>

    <script>
        const board = document.getElementById('tactical-board');
        const elementsContainer = document.getElementById('elements-container');
        const drawingSvg = document.getElementById('drawing-svg');
        const z14 = document.getElementById('z14');

        let activeTool = null;
        let currentColor = '#3b82f6';
        let isDrawing = false;
        let startPoint = null;
        let currentElement = null;

        function setTool(tool, btn) {
            activeTool = (activeTool === tool) ? null : tool;
            document.querySelectorAll('.toolbar button').forEach(b => b.classList.remove('active'));
            if (activeTool) btn.classList.add('active');
        }

        function setColor(color) { currentColor = color; }

        function toggleZone14() { z14.style.display = (z14.style.display === 'block') ? 'none' : 'block'; }

        function spawnTeam(color) {
            for(let i = 1; i <= 11; i++) {
                const el = document.createElement('div');
                el.className = `draggable team-${color}`;
                el.innerText = i;
                el.style.left = `${15 + (i * 5)}%`;
                el.style.top = (color === 'blue') ? '40%' : '60%';
                bindDrag(el);
                elementsContainer.appendChild(el);
            }
        }

        function spawnBall() {
            const ball = document.createElement('div');
            ball.className = 'draggable ball';
            ball.style.left = '50%'; ball.style.top = '50%';
            bindDrag(ball);
            elementsContainer.appendChild(ball);
        }

        function clearLines() { drawingSvg.querySelectorAll('path, line').forEach(e => e.remove()); }
        function clearAll() { clearLines(); elementsContainer.innerHTML = ''; z14.style.display = 'none'; }

        // Drag & Drop na dotyk i myszkę
        function bindDrag(el) {
            let posX = 0, posY = 0, startX = 0, startY = 0;
            el.addEventListener('touchstart', dragStart, {passive: false});
            el.addEventListener('mousedown', dragStart);

            function dragStart(e) {
                e.preventDefault();
                startX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
                startY = e.type === 'touchstart' ? e.touches[0].clientY : e.clientY;
                document.addEventListener('touchmove', dragMove, {passive: false});
                document.addEventListener('mousemove', dragMove);
                document.addEventListener('touchend', dragEnd);
                document.addEventListener('mouseup', dragEnd);
            }

            function dragMove(e) {
                const clientX = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
                const clientY = e.type === 'touchmove' ? e.touches[0].clientY : e.clientY;
                const rect = board.getBoundingClientRect();
                
                let x = ((clientX - rect.left) / rect.width) * 100;
                let y = ((clientY - rect.top) / rect.height) * 100;

                if(x < 0) x = 0; if(x > 100) x = 100;
                if(y < 0) y = 0; if(y > 100) y = 100;

                el.style.left = x + '%';
                el.style.top = y + '%';
            }

            function dragEnd() {
                document.removeEventListener('touchmove', dragMove);
                document.removeEventListener('mousemove', dragMove);
            }
        }

        // Rysowanie na SVG
        board.addEventListener('touchstart', drawStart, {passive: false});
        board.addEventListener('mousedown', drawStart);

        function getSVGCoords(e) {
            const rect = board.getBoundingClientRect();
            const clientX = e.type.startsWith('touch') ? e.touches[0].clientX : e.clientX;
            const clientY = e.type.startsWith('touch') ? e.touches[0].clientY : e.clientY;
            return {
                x: ((clientX - rect.left) / rect.width) * 100,
                y: ((clientY - rect.top) / rect.height) * 100
            };
        }

        function drawStart(e) {
            if (!activeTool || e.target.classList.contains('draggable')) return;
            isDrawing = true;
            startPoint = getSVGCoords(e);

            if (activeTool === 'draw' || activeTool === 'run') {
                currentElement = document.createElementNS("http://www.w3.org/2000/svg", "path");
                currentElement.setAttribute("d", `M ${startPoint.x} ${startPoint.y}`);
                currentElement.setAttribute("stroke", currentColor);
                currentElement.setAttribute("stroke-width", "0.6");
                currentElement.setAttribute("fill", "none");
                if (activeTool === 'run') currentElement.setAttribute("stroke-dasharray", "1, 1");
                drawingSvg.appendChild(currentElement);
            } else if (activeTool === 'arrow') {
                currentElement = document.createElementNS("http://www.w3.org/2000/svg", "line");
                currentElement.setAttribute("x1", startPoint.x); currentElement.setAttribute("y1", startPoint.y);
                currentElement.setAttribute("x2", startPoint.x); currentElement.setAttribute("y2", startPoint.y);
                currentElement.setAttribute("stroke", currentColor);
                currentElement.setAttribute("stroke-width", "0.6");
                currentElement.setAttribute("marker-end", "url(#arrowhead)");
                drawingSvg.appendChild(currentElement);
            }

            document.addEventListener('touchmove', drawMove, {passive: false});
            document.addEventListener('mousemove', drawMove);
            document.addEventListener('touchend', drawEnd);
            document.addEventListener('mouseup', drawEnd);
        }

        function drawMove(e) {
            if (!isDrawing || !currentElement) return;
            const pt = getSVGCoords(e);

            if (activeTool === 'draw' || activeTool === 'run') {
                const d = currentElement.getAttribute("d");
                currentElement.setAttribute("d", `${d} L ${pt.x} ${pt.y}`);
            } else if (activeTool === 'arrow') {
                currentElement.setAttribute("x2", pt.x);
                currentElement.setAttribute("y2", pt.y);
            }
        }

        function drawEnd() {
            isDrawing = false; currentElement = null;
            document.removeEventListener('touchmove', drawMove);
            document.removeEventListener('mousemove', drawMove);
        }

        function downloadBoard() {
            html2canvas(board).then(canvas => {
                const link = document.createElement('a');
                link.download = 'taktyka.png';
                link.href = canvas.toDataURL();
                link.click();
            });
        }
    </script>
</body>
  </html>
