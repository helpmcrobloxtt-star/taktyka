<style>
:root {
  --bg: #0A0E1A;

  --panel-border: rgba(255,255,255,0.08);
  --panel-hover: rgba(255,255,255,0.07);
  --primary: #10B981;
  --primary-dim: rgba(16,185,129,0.15);
  --gold: #F0B93F;
  --gold-dim: rgba(240,185,63,0.15);
  --danger: #EF4444;
  --danger-dim: rgba(239,68,68,0.15);
  --info: #4B9FE1;
  --info-dim: rgba(75,159,225,0.15);
  --text: #E7ECF3;
  --muted: #8B96AB;
  --muted-dim: #5B6479;
  --radius: 16px;
  --radius-sm: 10px;
  --shadow: 0 8px 32px rgba(0,0,0,0.35);
  --font-display: 'Space Grotesk', sans-serif;
  --font-body: 'Inter', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  background:radial-gradient(ellipse 80% 50% at 20% -10%, rgba(16,185,129,0.10), transparent),
    radial-gradient(ellipse 60% 50% at 100% 0%, rgba(240,185,63,0.07), transparent),
    var(--bg);
  color:var(--text);
  font-family:var(--font-body);
  min-height:100vh;
  display:flex;
  overflow-x:hidden;
}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:8px;}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.2);}
::selection{background:var(--primary);color:#04140D;}
a{color:inherit;text-decoration:none;}
button{font-family:inherit;cursor:pointer;}
input,select{font-family:inherit;}
@media (prefers-reduced-motion: reduce){

}
body.light-mode{
  --bg:#F3F5F8;

  --panel-border: rgba(15,23,42,0.08);

  --muted-dim:#94A0B8;

}

}
.sidebar{
  width:230px;
  min-width:230px;
  height:100vh;
  position:sticky;
  top:0;
  background:var(--panel-solid);
  border-right:1px solid var(--panel-border);

  flex-direction:column;
  padding:22px 14px;

}
.sidebar.collapsed{width:76px;min-width:76px;}
.sidebar.collapsed .brand-text,
.sidebar.collapsed .nav-label,
.sidebar.collapsed .nav-section-title,
.sidebar.collapsed .sidebar-footer-text{display:none;}
.brand{
  display:flex;align-items:center;gap:10px;
  padding:6px 10px 22px 10px;
  font-family:var(--font-display);
}
.brand-mark{
  width:34px;height:34px;border-radius:10px;
  background:linear-gradient(135deg, var(--primary), var(--gold));
  display:flex;align-items:center;justify-content:center;
  font-weight:700;color:#04140D;font-size:16px;
  flex-shrink:0;
  box-shadow:0 4px 14px rgba(16,185,129,0.35);
}
.brand-text{font-size:17px;font-weight:700;letter-spacing:0.2px;white-space:nowrap;}
.brand-text span{color:var(--gold);}
.nav-section-title{
  font-size:11px;text-transform:uppercase;letter-spacing:1px;
  color:var(--muted-dim);margin:16px 10px 8px 10px;font-weight:600;
}
.nav-item{
  display:flex;align-items:center;gap:12px;
  padding:10px 12px;border-radius:var(--radius-sm);
  color:var(--muted);font-size:14px;font-weight:500;
  margin-bottom:2px;transition:all .18s ease;
  white-space:nowrap;overflow:hidden;position:relative;cursor:pointer;
}
.nav-item:hover{background:var(--panel-hover);color:var(--text);}
.nav-item.active{
  background:var(--primary-dim);color:var(--primary);
}
.nav-item.active::before{
  content:'';position:absolute;left:-14px;top:50%;transform:translateY(-50%);
  width:4px;height:60%;background:var(--primary);border-radius:0 4px 4px 0;
}
.nav-icon{width:18px;height:18px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.sidebar-footer{
  margin-top:auto;padding-top:14px;border-top:1px solid var(--panel-border);
  display:flex;align-items:center;gap:10px;padding-left:10px;
}
.collapse-btn{
  width:100%;padding:8px;border:none;background:var(--panel-hover);
  border-radius:var(--radius-sm);color:var(--muted);font-size:12px;
  display:flex;align-items:center;justify-content:center;gap:6px;
  margin-top:10px;transition:all .2s;
}
.collapse-btn:hover{color:var(--text);}
.main-wrap{flex:1;min-width:0;display:flex;flex-direction:column;height:100vh;overflow-y:auto;}
.topbar{
  position:sticky;top:0;z-index:90;
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 28px;
  background:rgba(10,14,26,0.72);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--panel-border);
  gap:16px;flex-wrap:wrap;
}
body.light-mode .topbar{background:rgba(243,245,248,0.75);}
.topbar-left{display:flex;align-items:center;gap:14px;}
.page-title{font-family:var(--font-display);font-size:20px;font-weight:700;}
.page-sub{font-size:12px;color:var(--muted);margin-top:2px;}
.topbar-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.profile-switch{
  display:flex;align-items:center;gap:8px;
  background:var(--panel);border:1px solid var(--panel-border);
  padding:6px 12px 6px 6px;border-radius:999px;
  position:relative;
}
.avatar{
  width:30px;height:30px;border-radius:50%;
  background:linear-gradient(135deg,var(--info),var(--primary));
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;color:#fff;
}
.profile-switch select{
  background:transparent;border:none;color:var(--text);font-size:13px;font-weight:600;
  outline:none;appearance:none;padding-right:14px;cursor:pointer;
}
.pill-select{
  background:var(--panel);border:1px solid var(--panel-border);
  color:var(--text);padding:8px 12px;border-radius:999px;font-size:13px;font-weight:600;
  outline:none;appearance:none;cursor:pointer;
}
.icon-btn{
  width:38px;height:38px;border-radius:50%;
  background:var(--panel);border:1px solid var(--panel-border);
  display:flex;align-items:center;justify-content:center;
  color:var(--muted);position:relative;transition:all .18s ease;
  font-size:16px;
}
.icon-btn:hover{color:var(--text);background:var(--panel-hover);}
.notif-dot{
  position:absolute;top:6px;right:7px;width:8px;height:8px;border-radius:50%;
  background:var(--danger);border:2px solid var(--panel-solid);
}
.btn-primary{
  background:linear-gradient(135deg,var(--primary),#0ea371);
  color:#04140D;border:none;padding:10px 18px;border-radius:999px;
  font-size:13px;font-weight:700;display:flex;align-items:center;gap:8px;
  box-shadow:0 4px 16px rgba(16,185,129,0.3);transition:transform .15s ease;
}
.btn-primary:hover{transform:translateY(-1px);}
.btn-primary:active{transform:translateY(0);}
.content{padding:24px 28px 60px 28px;}
</style>

<style>
.hero-ticker{
  position:relative;overflow:hidden;
  border-radius:20px;

.hero-left{position:relative;z-index:2;}

.grid{display:grid;gap:18px;}
.grid-4{grid-template-columns:repeat(4,1fr);}
.grid-3{grid-template-columns:repeat(3,1fr);}
.grid-2{grid-template-columns:repeat(2,1fr);}
@media (max-width:1400px){.grid-4{grid-template-columns:repeat(2,1fr);} .grid-3{grid-template-columns:repeat(2,1fr);}}
@media (max-width:900px){.grid-4,.grid-3,.grid-2{grid-template-columns:1fr;}}

.toast-container{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:10px;max-width:360px;}
.toast{background:var(--panel-solid);border:1px solid var(--panel-border);border-radius:var(--radius-sm);padding:14px 18px;box-shadow:var(--shadow);backdrop-filter:blur(12px);animation:slideIn .3s ease;font-size:13px;}
.toast.success{border-left:4px solid var(--primary);}
.toast.error{border-left:4px solid var(--danger);}
.toast.warn{border-left:4px solid var(--gold);}
.toast.info{border-left:4px solid var(--info);}
@keyframes slideIn{from{transform:translateX(60px);opacity:0;}to{transform:translateX(0);opacity:1;}}

.flex{display:flex;}
.flex-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.mt-8{margin-top:8px;}

.mb-8{margin-bottom:8px;}

.text-muted{color:var(--muted);}

.font-mono{font-family:var(--font-mono);}
.w-full{width:100%;}

.justify-between{justify-content:space-between;}
.flex-wrap{flex-wrap:wrap;}
.gap-8{gap:8px;}

</style>

function loadDB(){
  try{
    const raw = localStorage.getItem(DB_KEY);
    if(!raw){ DB = defaultDB(); saveDB(); return DB; }
    DB = JSON.parse(raw);
    if(!DB.version || DB.version < 5){ DB = defaultDB(); saveDB(); }
    return DB;
  }catch(e){
    console.error('Błąd wczytywania bazy, tworzę nową.', e);
    DB = defaultDB();
    saveDB();
    return DB;
  }
}

function saveDB(){
  DB.lastSave = Date.now();
  localStorage.setItem(DB_KEY, JSON.stringify(DB));
}

function getUser(id){ return DB.users[id || DB.currentUserId]; }
function getCurrentUser(){ return DB.users[DB.currentUserId]; }

function round2(n){ return Math.round(n * 100) / 100; }

function convertCurrency(amount, fromCur, toCur){
  if(fromCur === toCur) return amount;
  const plnAmount = amount / DB.fxRates[fromCur];
  return plnAmount * DB.fxRates[toCur];
}

function toDisplay(amountInPLN){
  return convertCurrency(amountInPLN, 'PLN', DB.displayCurrency);
}

function fmtMoney(amountInPLN, opts){
  opts = opts || {};
  const cur = opts.currency || DB.displayCurrency;
  const val = opts.alreadyConverted ? amountInPLN : convertCurrency(amountInPLN, 'PLN', cur);
  const sign = val < 0 ? '-' : (opts.forceSign ? '+' : '');
  const abs = Math.abs(val);
  const formatted = abs.toLocaleString('pl-PL', {minimumFractionDigits:2, maximumFractionDigits:2});
  return `${sign}${formatted} ${CURRENCY_SYMBOLS[cur]}`;
}

function pushNotification(message, kind){
  DB.notifications.unshift({
    id: 'n_' + Date.now() + '_' + Math.floor(Math.random() * 9999),
    message,
    kind: kind || 'info',
    ts: Date.now(),
    read: false
  });
  if(DB.notifications.length > 100) DB.notifications.length = 100;
  saveDB();
}

function addTransaction(userId, category, amountPLN, note, opts){
  opts = opts || {};
  const user = getUser(userId);
  const meta = CATEGORY_META[category] || CATEGORY_META.inne;
  const kind = opts.kind || meta.kind;
  const delta = kind === 'expense' ? -Math.abs(amountPLN) : Math.abs(amountPLN);
  const target = opts.targetField || 'balance';
  user[target] = round2(user[target] + delta);
  user.history.unshift({
    ts: Date.now(),
    simMonth: `${DB.simDate.year}-${String(DB.simDate.month + 1).padStart(2, '0')}`,
    category,
    kind,
    amountPLN: delta,
    note: note || meta.label,
    balanceAfter: user.balance,
    savingsAfter: user.savings
  });
  if(user.history.length > 500) user.history.length = 500;
  saveDB();
  return delta;
}

function calcNetWorth(user){
  let total = user.balance + user.savings;
  Object.entries(user.portfolio.crypto).forEach(([sym, qty]) => {
    const c = DB.market.crypto.find(x => x.sym === sym);
    if(c) total += c.price * qty;
  });
  Object.entries(user.portfolio.stocks).forEach(([sym, qty]) => {
    const s = DB.market.stocks.find(x => x.sym === sym);
    if(s) total += s.price * qty;
  });
  user.portfolio.realEstate.forEach(p => total += p.value - (p.mortgage || 0));
  user.portfolio.bonds.forEach(b => total += b.amount);
  user.portfolio.deposits.forEach(d => total += d.amount);
  user.portfolio.startups.forEach(s => { if(!s.resolved) total += s.invested; });
  total += user.portfolio.ppk;
  total += user.portfolio.goldOz * DB.market.commodities.gold.price;
  total += user.portfolio.oilBarrels * DB.market.commodities.oil.price;
  user.loans.forEach(l => total -= l.remaining);
  return round2(total);
}

function calcFamilyNetWorth(){
  return round2(Object.values(DB.users).reduce((sum, u) => sum + calcNetWorth(u), 0) + DB.familyPool.balance);
}

function addFamilyMember(name, initials, role, balance, savings){
  const id = 'u_' + Date.now() + '_' + Math.floor(Math.random() * 1000);
  const user = makeDefaultUser(id, name, initials, role, balance || 5000, savings || 1000);
  DB.users[id] = user;
  pushNotification(`Dodano nowego członka rodziny: ${name} (${role})`, 'success');
  saveDB();
  return id;
}

function removeFamilyMember(userId){
  if(userId === 'u_head') return {ok: false, error: 'Nie można usunąć głowy rodziny'};
  if(!DB.users[userId]) return {ok: false, error: 'Użytkownik nie istnieje'};
  delete DB.users[userId];
  pushNotification(`Usunięto członka rodziny`, 'warn');
  saveDB();
  return {ok: true};
}

function getFamilyMembers(){
  return Object.values(DB.users);
}

function getFamilyLeaderboard(){
  return Object.values(DB.users)
    .map(u => ({...u, netWorth: calcNetWorth(u)}))
    .sort((a, b) => b.netWorth - a.netWorth);
}

function transferBetweenUsers(fromId, toId, amountPLN, note){
  const from = getUser(fromId);
  const to = getUser(toId);
  if(from.balance < amountPLN) return {ok: false, error: 'Niewystarczające środki'};
  addTransaction(fromId, 'przelew_out', amountPLN, note || `Przelew do ${to.name}`);
  addTransaction(toId, 'przelew_in', amountPLN, note || `Przelew od ${from.name}`);
  saveDB();
  return {ok: true};
}

function transferToFamilyPool(userId, amountPLN, note){
  const user = getUser(userId);
  if(user.balance < amountPLN) return {ok: false, error: 'Niewystarczające środki'};
  addTransaction(userId, 'przelew_out', amountPLN, note || 'Wpłata do puli rodzinnej');
  DB.familyPool.balance = round2(DB.familyPool.balance + amountPLN);
  DB.familyPool.history.unshift({ts: Date.now(), userId, amountPLN, note: note || 'Wpłata'});
  saveDB();
  return {ok: true};
}

function withdrawFromFamilyPool(userId, amountPLN, note){
  if(DB.familyPool.balance < amountPLN) return {ok: false, error: 'Pula rodzinna ma za mało środków'};
  DB.familyPool.balance = round2(DB.familyPool.balance - amountPLN);
  addTransaction(userId, 'przelew_in', amountPLN, note || 'Wypłata z puli rodzinnej');
  DB.familyPool.history.unshift({ts: Date.now(), userId, amountPLN: -amountPLN, note: note || 'Wypłata'});
  saveDB();
  return {ok: true};
}

function refreshJobOffers(){
  const count = 6 + Math.floor(Math.random() * 5);
  const shuffled = [...JOB_OFFERS_POOL].sort(() => Math.random() - 0.5);
  DB.jobOffersAvailable = shuffled.slice(0, count).map(j => ({
    ...j,
    id: j.id + '_' + Date.now() + '_' + Math.floor(Math.random() * 1000),
    expires: Date.now() + 7 * 24 * 60 * 60 * 1000
  }));
  saveDB();
  return DB.jobOffersAvailable;
}

function applyForJob(userId, jobId){
  const user = getUser(userId);
  const job = DB.jobOffersAvailable.find(j => j.id === jobId);
  if(!job) return {ok: false, error: 'Oferta wygasła lub nie istnieje'};
  
  const successRate = job.successBase + (user.creditScore / 200);
  const success = Math.random() < Math.min(successRate, 0.95);
  
  DB.jobOffersAvailable = DB.jobOffersAvailable.filter(j => j.id !== jobId);
  
  if(success){
    user.jobs.push({
      id: 'j_' + Date.now(),
      title: job.title,
      salary: job.salary,
      sector: job.sector,
      startMonth: `${DB.simDate.year}-${String(DB.simDate.month + 1).padStart(2, '0')}`,
      active: true
    });
    pushNotification(`🎉 Rozpocząłeś pracę jako ${job.title} (${job.salary} PLN/mies.)`, 'success');
    saveDB();
    return {ok: true, message: `Zdobyto pracę: ${job.title}`, job: job};
  } else {
    pushNotification(`❌ Nie udało się dostać pracy: ${job.title}`, 'error');
    saveDB();
    return {ok: false, message: `Nie udało się dostać pracy: ${job.title}`};
  }
}

function quitJob(userId, jobId){
  const user = getUser(userId);
  const idx = user.jobs.findIndex(j => j.id === jobId && j.active);
  if(idx === -1) return {ok: false, error: 'Praca nie istnieje lub już nieaktywna'};
  const job = user.jobs[idx];
  job.active = false;
  job.endMonth = `${DB.simDate.year}-${String(DB.simDate.month + 1).padStart(2, '0')}`;
  pushNotification(`👋 Zrezygnowano z pracy: ${job.title}`, 'warn');
  saveDB();
  return {ok: true};
}

function collectSalary(userId){
  const user = getUser(userId);
  let totalSalary = 0;
  user.jobs.forEach(job => {
    if(job.active){
      const net = job.salary * (1 - 0.12);
      totalSalary += net;
      addTransaction(userId, 'wyplata', net, `Wypłata: ${job.title} (po podatku)`);
    }
  });
  if(totalSalary > 0){
    pushNotification(`💵 Otrzymano wypłaty: ${fmtMoney(totalSalary)}`, 'success');
    saveDB();
  }
  return totalSalary;
    }

/* ---------- AKTUALIZACJA RYNKU ---------- */
function fluctuateFxRates(){
  Object.keys(DB.fxRates).forEach(cur => {
    if(cur === 'PLN') return;
    const drift = (Math.random() - 0.5) * 0.01;
    DB.fxRates[cur] = Math.max(BASE_FX_RATES[cur] * 0.85, 
      Math.min(BASE_FX_RATES[cur] * 1.15, DB.fxRates[cur] * (1 + drift)));
  });
}

function updateMarketPrices(){
  // Krypto
  DB.market.crypto.forEach(c => {
    const change = (Math.random() - 0.5) * c.vol * 2;
    c.price = Math.max(0.01, c.price * (1 + change));
    c.history.push(c.price);
    if(c.history.length > 100) c.history.shift();
  });
  // Akcje
  DB.market.stocks.forEach(s => {
    const change = (Math.random() - 0.5) * s.vol * 2;
    s.price = Math.max(0.01, s.price * (1 + change));
    s.history.push(s.price);
    if(s.history.length > 100) s.history.shift();
  });
  // Surowce
  ['gold', 'oil'].forEach(key => {
    const item = DB.market.commodities[key];
    const change = (Math.random() - 0.5) * item.vol * 2;
    item.price = Math.max(0.01, item.price * (1 + change));
    item.history.push(item.price);
    if(item.history.length > 100) item.history.shift();
  });
  fluctuateFxRates();
  saveDB();
}

/* ---------- KRYPTOWALUTY ---------- */
function buyCrypto(userId, symbol, quantity){
  const user = getUser(userId);
  const asset = DB.market.crypto.find(c => c.sym === symbol);
  if(!asset) return {ok: false, error: 'Nieznana kryptowaluta'};
  const cost = asset.price * quantity;
  if(user.balance < cost) return {ok: false, error: 'Niewystarczające środki'};
  user.balance = round2(user.balance - cost);
  user.portfolio.crypto[symbol] = (user.portfolio.crypto[symbol] || 0) + quantity;
  addTransaction(userId, 'inwestycja', cost, `Zakup ${quantity} ${symbol} po ${fmtMoney(asset.price)}`);
  pushNotification(`📈 Zakupiono ${quantity} ${symbol}`, 'info');
  saveDB();
  return {ok: true, cost: cost};
}

function sellCrypto(userId, symbol, quantity){
  const user = getUser(userId);
  const asset = DB.market.crypto.find(c => c.sym === symbol);
  if(!asset) return {ok: false, error: 'Nieznana kryptowaluta'};
  const held = user.portfolio.crypto[symbol] || 0;
  if(held < quantity) return {ok: false, error: 'Niewystarczająca ilość'};
  const revenue = asset.price * quantity;
  user.balance = round2(user.balance + revenue);
  user.portfolio.crypto[symbol] = held - quantity;
  if(user.portfolio.crypto[symbol] === 0) delete user.portfolio.crypto[symbol];
  addTransaction(userId, 'sprzedaz', revenue, `Sprzedaż ${quantity} ${symbol} po ${fmtMoney(asset.price)}`);
  pushNotification(`💰 Sprzedano ${quantity} ${symbol}`, 'info');
  saveDB();
  return {ok: true, revenue: revenue};
}

/* ---------- RACHUNKI ---------- */
function payBill(userId, billId){
  const user = getUser(userId);
  const bill = user.bills.find(b => b.id === billId);
  if(!bill) return {ok: false, error: 'Rachunek nie istnieje'};
  if(bill.paid) return {ok: false, error: 'Rachunek już opłacony'};
  if(user.balance < bill.amount) return {ok: false, error: 'Niewystarczające środki'};
  user.balance = round2(user.balance - bill.amount);
  bill.paid = true;
  addTransaction(userId, 'rachunki', bill.amount, `Opłata: ${bill.name}`);
  pushNotification(`✅ Opłacono rachunek: ${bill.name} (${fmtMoney(bill.amount)})`, 'success');
  saveDB();
  return {ok: true};
}

function processMonthlyBills(userId){
  const user = getUser(userId);
  let totalBills = 0;
  let overdueCount = 0;
  user.bills.forEach(bill => {
    if(!bill.paid){
      bill.overdueCount = (bill.overdueCount || 0) + 1;
      const penalty = bill.amount * 0.05 * bill.overdueCount;
      if(user.balance >= penalty){
        user.balance = round2(user.balance - penalty);
        addTransaction(userId, 'kara', penalty, `Kara za zwłokę: ${bill.name}`);
        totalBills += penalty;
      }
      overdueCount++;
      user.creditScore = Math.max(0, user.creditScore - 2);
    }
    bill.paid = false;
  });
  if(overdueCount > 0){
    pushNotification(`⚠️ ${overdueCount} nieopłaconych rachunków, naliczono kary`, 'error');
  }
  saveDB();
  return totalBills;
}

/* ---------- KREDYTY ---------- */
function takeLoan(userId, amount, rate, months){
  const user = getUser(userId);
  const maxLoan = user.balance * 3 + user.savings * 0.5;
  if(amount > maxLoan) return {ok: false, error: 'Przekroczono zdolność kredytową'};
  const monthlyRate = rate / 12;
  const monthlyPayment = amount * monthlyRate * Math.pow(1 + monthlyRate, months) / 
    (Math.pow(1 + monthlyRate, months) - 1);
  const id = 'loan_' + Date.now();
  user.loans.push({
    id,
    type: 'gotówkowy',
    principal: amount,
    remaining: amount,
    rate: rate,
    months: months,
    monthlyPayment: monthlyPayment,
    startMonth: `${DB.simDate.year}-${String(DB.simDate.month + 1).padStart(2, '0')}`
  });
  user.balance = round2(user.balance + amount);
  addTransaction(userId, 'przelew_in', amount, `Nowy kredyt (${months} mies., ${rate*100}%)`);
  pushNotification(`🏦 Zaciągnięto kredyt: ${fmtMoney(amount)}`, 'info');
  saveDB();
  return {ok: true, monthlyPayment: monthlyPayment};
}

function processLoanPayment(userId){
  const user = getUser(userId);
  let totalPaid = 0;
  user.loans.forEach(loan => {
    if(loan.remaining > 0){
      const payment = Math.min(loan.monthlyPayment, loan.remaining);
      if(user.balance >= payment){
        user.balance = round2(user.balance - payment);
        loan.remaining = round2(loan.remaining - payment);
        addTransaction(userId, 'kredyt_rata', payment, 
          `Rata kredytu (pozostało: ${fmtMoney(loan.remaining)})`);
        totalPaid += payment;
        if(loan.remaining <= 0){
          pushNotification(`✅ Kredyt spłacony!`, 'success');
          user.creditScore = Math.min(100, user.creditScore + 5);
        }
      } else {
        user.creditScore = Math.max(0, user.creditScore - 3);
        pushNotification(`⚠️ Brak środków na ratę kredytu!`, 'error');
      }
    }
  });
  if(totalPaid > 0) saveDB();
  return totalPaid;
}

function getLoanAmortizationSchedule(loan){
  const schedule = [];
  let remaining = loan.principal;
  const monthlyRate = loan.rate / 12;
  for(let i = 1; i <= loan.months; i++){
    const interest = remaining * monthlyRate;
    const principal = loan.monthlyPayment - interest;
    remaining = Math.max(0, remaining - principal);
    schedule.push({
      month: i,
      payment: loan.monthlyPayment,
      principal: principal,
      interest: interest,
      remaining: remaining
    });
    if(remaining <= 0) break;
  }
  return schedule;
}

/* ---------- UBEZPIECZENIA ---------- */
function buyInsurance(userId, type, monthlyCost, coverage){
  const user = getUser(userId);
  if(user.balance < monthlyCost) return {ok: false, error: 'Niewystarczające środki'};
  user.balance = round2(user.balance - monthlyCost);
  const id = 'ins_' + Date.now();
  user.insurances.push({
    id,
    type,
    monthlyCost,
    coverage,
    startMonth: `${DB.simDate.year}-${String(DB.simDate.month + 1).padStart(2, '0')}`,
    active: true
  });
  addTransaction(userId, 'ubezpieczenie', monthlyCost, `Ubezpieczenie: ${type}`);
  pushNotification(`🛡️ Wykupiono ubezpieczenie ${type}`, 'success');
  saveDB();
  return {ok: true};
}

function cancelInsurance(userId, insuranceId){
  const user = getUser(userId);
  const idx = user.insurances.findIndex(i => i.id === insuranceId && i.active);
  if(idx === -1) return {ok: false, error: 'Ubezpieczenie nie istnieje lub już nieaktywne'};
  user.insurances[idx].active = false;
  pushNotification(`🛡️ Anulowano ubezpieczenie`, 'warn');
  saveDB();
  return {ok: true};
}

function processInsuranceClaim(userId, type, damageAmount){
  const user = getUser(userId);
  const insurance = user.insurances.find(i => i.type === type && i.active);
  if(!insurance) return {ok: false, error: 'Brak aktywnego ubezpieczenia tego typu'};
  const covered = Math.min(damageAmount, insurance.coverage);
  user.balance = round2(user.balance + covered);
  addTransaction(userId, 'przelew_in', covered, `Odszkodowanie z ubezpieczenia ${type}`);
  pushNotification(`💰 Otrzymano odszkodowanie: ${fmtMoney(covered)}`, 'success');
  saveDB();
  return {ok: true, covered: covered};
}

function processMonthlyInsurance(userId){
  const user = getUser(userId);
  let totalCost = 0;
  user.insurances.forEach(ins => {
    if(ins.active){
      if(user.balance >= ins.monthlyCost){
        user.balance = round2(user.balance - ins.monthlyCost);
        addTransaction(userId, 'ubezpieczenie', ins.monthlyCost, 
          `Składka ubezpieczeniowa: ${ins.type}`);
        totalCost += ins.monthlyCost;
      } else {
        ins.active = false;
        pushNotification(`⚠️ Brak środków na ubezpieczenie ${ins.type} - anulowano`, 'error');
      }
    }
  });
  if(totalCost > 0) saveDB();
  return totalCost;
    }

function addStandingOrder(fromId, toId, amount, note, frequency, dayOfMonth){
  const from = getUser(fromId);
  if(from.balance < amount) return {ok: false, error: 'Niewystarczające środki na pierwsze zlecenie'};
  
  const order = {
    id: 'so_' + Date.now() + '_' + Math.floor(Math.random() * 1000),
    fromId: fromId,
    toId: toId,
    amount: amount,
    note: note || 'Zlecenie stałe',
    frequency: frequency || 'monthly', // monthly, biweekly
    dayOfMonth: dayOfMonth || 1,
    active: true,
    nextExecution: `${DB.simDate.year}-${String(DB.simDate.month + 1).padStart(2, '0')}-${String(dayOfMonth || 1).padStart(2, '0')}`,
    created: Date.now()
  };
  
  // Wykonaj pierwsze zlecenie od razu
  const result = transferBetweenUsers(fromId, toId, amount, note || 'Zlecenie stałe');
  if(result.ok){
    DB.standingOrders.push(order);
    pushNotification(`📋 Dodano zlecenie stałe: ${note || 'Przelew'} ${fmtMoney(amount)}`, 'success');
    saveDB();
    return {ok: true, order: order};
  } else {
    return {ok: false, error: result.error};
  }
}

function removeStandingOrder(orderId){
  const idx = DB.standingOrders.findIndex(o => o.id === orderId);
  if(idx === -1) return {ok: false, error: 'Zlecenie nie istnieje'};
  DB.standingOrders.splice(idx, 1);
  pushNotification(`🗑️ Usunięto zlecenie stałe`, 'warn');
  saveDB();
  return {ok: true};
}

function toggleStandingOrder(orderId){
  const order = DB.standingOrders.find(o => o.id === orderId);
  if(!order) return {ok: false, error: 'Zlecenie nie istnieje'};
  order.active = !order.active;
  pushNotification(`🔄 Zlecenie stałe ${order.active ? 'aktywowano' : 'dezaktywowano'}`, 'info');
  saveDB();
  return {ok: true, active: order.active};
}

function processStandingOrders(){
  let executed = 0;
  const today = `${DB.simDate.year}-${String(DB.simDate.month + 1).padStart(2, '0')}-${String(new Date().getDate()).padStart(2, '0')}`;
  
  DB.standingOrders.forEach(order => {
    if(!order.active) return;
    
    // Sprawdź czy dziś jest dzień wykonania
    const currentDay = new Date().getDate();
    if(currentDay !== order.dayOfMonth) return;
    
    const result = transferBetweenUsers(order.fromId, order.toId, order.amount, order.note);
    if(result.ok){
      executed++;
      pushNotification(`✅ Wykonano zlecenie stałe: ${order.note} (${fmtMoney(order.amount)})`, 'success');
    } else {
      pushNotification(`❌ Błąd wykonania zlecenia stałego: ${order.note} - ${result.error}`, 'error');
    }
  });
  
  if(executed > 0) saveDB();
  return executed;
}

function generateRandomEvent(){
  const events = [
    { 
      type: 'bonus', 
      probability: 0.3, 
      minAmount: 100, 
      maxAmount: 5000,
      message: '🎁 Otrzymano bonus!',
      category: 'bonus'
    },
    { 
      type: 'penalty', 
      probability: 0.2, 
      minAmount: 50, 
      maxAmount: 2000,
      message: '💥 Poniesiono koszt!',
      category: 'zdarzenie_neg'
    },
    { 
      type: 'windfall', 
      probability: 0.05, 
      minAmount: 5000, 
      maxAmount: 50000,
      message: '💰 Niespodziewany spadek!',
      category: 'bonus'
    },
    { 
      type: 'theft', 
      probability: 0.03, 
      minAmount: 200, 
      maxAmount: 3000,
      message: '🚨 Kradzież!',
      category: 'zdarzenie_neg'
    },
    { 
      type: 'promotion', 
      probability: 0.1, 
      minAmount: 0, 
      maxAmount: 0,
      message: '📈 Awans w pracy!',
      category: 'promotion'
    }
  ];
  
  const userKeys = Object.keys(DB.users);
  const userId = userKeys[Math.floor(Math.random() * userKeys.length)];
  const user = getUser(userId);
  
  // Losuj zdarzenie
  const availableEvents = events.filter(e => Math.random() < e.probability);
  if(availableEvents.length === 0) return null;
  
  const event = availableEvents[Math.floor(Math.random() * availableEvents.length)];
  
  if(event.type === 'promotion'){
    // Awans - zwiększ wypłatę jednej z prac
    const activeJobs = user.jobs.filter(j => j.active);
    if(activeJobs.length > 0){
      const job = activeJobs[Math.floor(Math.random() * activeJobs.length)];
      const oldSalary = job.salary;
      const increase = oldSalary * (0.05 + Math.random() * 0.15);
      job.salary = Math.round(job.salary + increase);
      pushNotification(`📈 Awans! ${job.title}: ${fmtMoney(oldSalary)} → ${fmtMoney(job.salary)}`, 'success');
      saveDB();
      return {type: 'promotion', user: userId, message: `Awans w pracy ${job.title}`};
    }
    return null;
  }
  
  if(event.type === 'bonus' || event.type === 'windfall'){
    const amount = event.minAmount + Math.random() * (event.maxAmount - event.minAmount);
    user.balance = round2(user.balance + amount);
    addTransaction(userId, event.category, amount, event.message);
    pushNotification(`${event.message} ${fmtMoney(amount)} dla ${user.name}`, 'success');
    saveDB();
    return {type: event.type, user: userId, amount: amount, message: event.message};
  }
  
  if(event.type === 'penalty' || event.type === 'theft'){
    const amount = event.minAmount + Math.random() * (event.maxAmount - event.minAmount);
    // Sprawdź ubezpieczenie
    const insurance = user.insurances.find(i => i.active);
    if(insurance && Math.random() < 0.6){
      const covered = Math.min(amount, insurance.coverage);
      user.balance = round2(user.balance - (amount - covered));
      addTransaction(userId, event.category, amount - covered, `${event.message} (ubezpieczenie pokryło ${fmtMoney(covered)})`);
      pushNotification(`🛡️ ${event.message} ${fmtMoney(amount - covered)} - ubezpieczenie pokryło ${fmtMoney(covered)}`, 'warn');
    } else {
      user.balance = round2(user.balance - amount);
      addTransaction(userId, event.category, amount, event.message);
      pushNotification(`${event.message} ${fmtMoney(amount)} dla ${user.name}`, 'error');
    }
    saveDB();
    return {type: event.type, user: userId, amount: amount, message: event.message};
  }
  
  return null;
}

function processRandomEvents(count){
  count = count || 2;
  const results = [];
  for(let i = 0; i < count; i++){
    const event = generateRandomEvent();
    if(event) results.push(event);
  }
  return results;
    }

/* ---------- NIERUCHOMOŚCI ---------- */
function buyRealEstate(userId, name, value, rent){
  const user = getUser(userId);
  if(user.balance < value) return {ok: false, error: 'Niewystarczające środki'};
  
  const property = {
    id: 're_' + Date.now(),
    name: name,
    value: value,
    rent: rent || value * 0.005, // 0.5% rentowności miesięcznej
    mortgage: 0,
    purchasedMonth: `${DB.simDate.year}-${String(DB.simDate.month + 1).padStart(2, '0')}`,
    maintenance: value * 0.001 // 0.1% kosztów utrzymania
  };
  
  user.balance = round2(user.balance - value);
  user.portfolio.realEstate.push(property);
  addTransaction(userId, 'inwestycja', value, `Zakup nieruchomości: ${name}`);
  pushNotification(`🏠 Zakupiono nieruchomość: ${name} (${fmtMoney(value)})`, 'success');
  saveDB();
  return {ok: true, property: property};
}

function sellRealEstate(userId, propertyId){
  const user = getUser(userId);
  const idx = user.portfolio.realEstate.findIndex(p => p.id === propertyId);
  if(idx === -1) return {ok: false, error: 'Nieruchomość nie istnieje'};
  
  const property = user.portfolio.realEstate[idx];
  const salePrice = property.value * (0.9 + Math.random() * 0.2); // 90-110% wartości
  
  user.balance = round2(user.balance + salePrice);
  user.portfolio.realEstate.splice(idx, 1);
  addTransaction(userId, 'sprzedaz', salePrice, `Sprzedaż nieruchomości: ${property.name}`);
  pushNotification(`💰 Sprzedano nieruchomość: ${property.name} za ${fmtMoney(salePrice)}`, 'info');
  saveDB();
  return {ok: true, salePrice: salePrice};
}

function collectRent(userId){
  const user = getUser(userId);
  let totalRent = 0;
  
  user.portfolio.realEstate.forEach(property => {
    const rent = property.rent;
    totalRent += rent;
    addTransaction(userId, 'czynsz_najem', rent, `Czynsz z najmu: ${property.name}`);
    
    // Koszty utrzymania
    const maintenance = property.maintenance || property.value * 0.001;
    if(user.balance >= maintenance){
      user.balance = round2(user.balance - maintenance);
      addTransaction(userId, 'rachunki', maintenance, `Koszty utrzymania: ${property.name}`);
    }
  });
  
  if(totalRent > 0){
    pushNotification(`🏠 Otrzymano czynsze: ${fmtMoney(totalRent)}`, 'success');
    saveDB();
  }
  return totalRent;
}

/* ---------- OBLIGACJE ---------- */
function buyBond(userId, amount, rate, months){
  const user = getUser(userId);
  if(user.balance < amount) return {ok: false, error: 'Niewystarczające środki'};
  
  const bond = {
    id: 'bond_' + Date.now(),
    amount: amount,
    rate: rate,
    months: months,
    startMonth: `${DB.simDate.year}-${String(DB.simDate.month + 1).padStart(2, '0')}`,
    interestAccrued: 0
  };
  
  user.balance = round2(user.balance - amount);
  user.portfolio.bonds.push(bond);
  addTransaction(userId, 'inwestycja', amount, `Zakup obligacji ${rate*100}% na ${months} mies.`);
  pushNotification(`📊 Zakupiono obligacje: ${fmtMoney(amount)} (${rate*100}%)`, 'info');
  saveDB();
  return {ok: true, bond: bond};
}

function processBondInterest(userId){
  const user = getUser(userId);
  let totalInterest = 0;
  
  user.portfolio.bonds.forEach(bond => {
    const monthlyRate = bond.rate / 12;
    const interest = bond.amount * monthlyRate;
    bond.interestAccrued = (bond.interestAccrued || 0) + interest;
    totalInterest += interest;
    
    // Sprawdź czy obligacja dojrzała
    const monthsPassed = Math.floor((Date.now() - new Date(bond.startMonth).getTime()) / (30 * 24 * 60 * 60 * 1000));
    if(monthsPassed >= bond.months){
      // Wypłata obligacji z odsetkami
      const totalPayout = bond.amount + bond.interestAccrued;
      user.balance = round2(user.balance + totalPayout);
      addTransaction(userId, 'odsetki', totalPayout, `Wykup obligacji (${fmtMoney(bond.amount)} + odsetki)`);
      pushNotification(`💰 Wykupiono obligację: ${fmtMoney(totalPayout)}`, 'success');
      // Usuń obligację z portfela
      const idx = user.portfolio.bonds.indexOf(bond);
      if(idx > -1) user.portfolio.bonds.splice(idx, 1);
    }
  });
  
  if(totalInterest > 0) saveDB();
  return totalInterest;
}

  return {ok: true, deposit: deposit};
}

function processDepositInterest(userId){
  const user = getUser(userId);
  let totalInterest = 0;
  
  user.portfolio.deposits.forEach(deposit => {
    const monthlyRate = deposit.rate / 12;
    const interest = deposit.amount * monthlyRate;
    deposit.interestAccrued = (deposit.interestAccrued || 0) + interest;
    totalInterest += interest;
    
    // Sprawdź czy lokata dojrzała
    const monthsPassed = Math.floor((Date.now() - new Date(deposit.startMonth).getTime()) / (30 * 24 * 60 * 60 * 1000));
    if(monthsPassed >= deposit.months){
      // Wypłata lokaty z odsetkami
      const totalPayout = deposit.amount + deposit.interestAccrued;
      user.balance = round2(user.balance + totalPayout);
      addTransaction(userId, 'odsetki', totalPayout, `Wypłata lokaty (${fmtMoney(deposit.amount)} + odsetki)`);
      pushNotification(`💰 Wypłacono lokatę: ${fmtMoney(totalPayout)}`, 'success');
      // Usuń lokatę z portfela
      const idx = user.portfolio.deposits.indexOf(deposit);
      if(idx > -1) user.portfolio.deposits.splice(idx, 1);
    }
  });
  
  if(totalInterest > 0) saveDB();
  return totalInterest;
}

/* ---------- STARTUPY ---------- */
function investInStartup(userId, name, amount, risk){
  const user = getUser(userId);
  if(user.balance < amount) return {ok: false, error: 'Niewystarczające środki'};
  
  const startup = {
    id: 'startup_' + Date.now(),
    name: name,
    invested: amount,
    risk: risk || 0.5, // 0-1
    startMonth: `${DB.simDate.year}-${String(DB.simDate.month + 1).padStart(2, '0')}`,
    resolved: false,
    result: null
  };
  
  user.balance = round2(user.balance - amount);
  user.portfolio.startups.push(startup);
  addTransaction(userId, 'inwestycja', amount, `Inwestycja w startup: ${name}`);
  pushNotification(`🚀 Zainwestowano w startup: ${name} (${fmtMoney(amount)})`, 'info');
  saveDB();
  return {ok: true, startup: startup};
}

function processStartups(userId){
  const user = getUser(userId);
  let totalResult = 0;
  
  user.portfolio.startups.forEach(startup => {
    if(startup.resolved) return;
    
    const monthsPassed = Math.floor((Date.now() - new Date(startup.startMonth).getTime()) / (30 * 24 * 60 * 60 * 1000));
    if(monthsPassed >= 12){ // Po roku
      startup.resolved = true;
      const success = Math.random() < (1 - startup.risk);
      
      if(success){
        const multiplier = 1.5 + Math.random() * 3; // 150-400% zwrotu
        const returnAmount = startup.invested * multiplier;
        user.balance = round2(user.balance + returnAmount);
        addTransaction(userId, 'sprzedaz', returnAmount, `Zwrot z startupu: ${startup.name} (${multiplier.toFixed(1)}x)`);
        pushNotification(`💰 Startup ${startup.name} wypalił! Zwrot: ${fmtMoney(returnAmount)}`, 'success');
        startup.result = 'success';
        totalResult += returnAmount;
      } else {
        pushNotification(`💥 Startup ${startup.name} upadł. Stracono ${fmtMoney(startup.invested)}`, 'error');
        startup.result = 'failure';
        totalResult -= startup.invested;
      }
    }
  });
  
  if(totalResult !== 0) saveDB();
  return totalResult;
    }

/* ---------- ZAAWANSOWANE OBLICZENIA ---------- */
function calculateCreditWorthiness(userId){
  const user = getUser(userId);
  let score = 0;
  score += user.creditScore * 0.6;
  score += Math.min(100, user.savings / 1000) * 0.2;
  score += Math.min(100, user.balance / 500) * 0.1;
  const debtRatio = user.loans.reduce((sum, l) => sum + l.remaining, 0) / (user.balance + user.savings + 1);
  score -= Math.min(50, debtRatio * 200);
  return Math.max(0, Math.min(100, Math.round(score)));
}

function getFinancialHealth(userId){
  const user = getUser(userId);
  const netWorth = calcNetWorth(user);
  const debt = user.loans.reduce((sum, l) => sum + l.remaining, 0);
  const liquidity = user.balance / (debt + 0.01);
  const score = user.creditScore;
  let health = 50;
  health += Math.min(30, netWorth / 10000) * 0.3;
  health += Math.min(20, liquidity * 5);
  health += score * 0.3;
  return Math.max(0, Math.min(100, Math.round(health)));
}

function getMonthlyCashflow(userId){
  const user = getUser(userId);
  let income = 0;
  let expenses = 0;
  
  // Przychody
  user.jobs.forEach(job => {
    if(job.active) income += job.salary * (1 - 0.12);
  });
  income += user.portfolio.realEstate.reduce((sum, p) => sum + p.rent, 0);
  
  // Wydatki
  user.bills.forEach(bill => expenses += bill.amount);
  user.loans.forEach(loan => {
    if(loan.remaining > 0) expenses += loan.monthlyPayment;
  });
  user.insurances.forEach(ins => {
    if(ins.active) expenses += ins.monthlyCost;
  });
  
  return {
    income: round2(income),
    expenses: round2(expenses),
    net: round2(income - expenses)
  };
}

/* ---------- SYMULACJA MIESIĄCA ---------- */
function advanceMonth(){
  const date = DB.simDate;
  date.month++;
  if(date.month > 11){ date.month = 0; date.year++; }
  
  let events = [];
  
  // Przetwarzaj dla każdego użytkownika
  Object.keys(DB.users).forEach(uid => {
    const user = getUser(uid);
    
    // 1. Wypłaty
    collectSalary(uid);
    
    // 2. Rachunki
    processMonthlyBills(uid);
    
    // 3. Kredyty
    processLoanPayment(uid);
    
    // 4. Dywidendy
    collectDividends(uid);
    
    // 5. Czynsze z nieruchomości
    collectRent(uid);
    
    // 6. Odsetki od obligacji
    processBondInterest(uid);
    
    // 7. Odsetki od lokat
    processDepositInterest(uid);
    
    // 8. Startupy
    processStartups(uid);
    
    // 9. Ubezpieczenia
    processMonthlyInsurance(uid);
    
    // 10. Odsetki od oszczędności
    const interest = user.savings * user.savingsRate;
    if(interest > 0.01){
      user.savings = round2(user.savings + interest);
      addTransaction(uid, 'odsetki', interest, `Odsetki od oszczędności (${(user.savingsRate * 100).toFixed(1)}%)`);
    }
    
    // 11. Sprawdź osiągnięcia
    checkAchievements(uid);
  });
  
  // 12. Zlecenia stałe
  processStandingOrders();
  
  // 13. Aktualizacja rynku
  updateMarketPrices();
  
  // 14. Zdarzenia losowe
  const randomEvents = processRandomEvents(2);
  events = events.concat(randomEvents);
  
  // 15. Odśwież oferty pracy
  refreshJobOffers();
  
  // 16. Aktualizacja scoringu dla wszystkich
  Object.keys(DB.users).forEach(uid => {
    const user = getUser(uid);
    // Delikatny wzrost scoringu za regularność
    if(user.balance > 0 && user.loans.every(l => l.remaining > 0)) {
      user.creditScore = Math.min(100, user.creditScore + 0.5);
    }
  });
  
  saveDB();
  pushNotification(`📅 Przesunięto na ${date.month+1}/${date.year}`, 'info');
  
  // Generuj podsumowanie
  const summary = {
    month: `${date.month+1}/${date.year}`,
    events: events,
    marketChanges: {
      btc: DB.market.crypto.find(c => c.sym === 'BTC').price,
      gold: DB.market.commodities.gold.price
    }
  };
  
  renderAll();
  return summary;
}

function exportDatabase(){

  const blob = new Blob([data], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `apex_bank_backup_${Date.now()}.json`;
  a.click();
  URL.revokeObjectURL(url);
  pushNotification('📦 Baza danych wyeksportowana', 'success');
}

function importDatabase(file){
  const reader = new FileReader();
  reader.onload = function(e){
    try{
      const data = JSON.parse(e.target.result);
      // Walidacja
      if(!data.version || !data.users) throw new Error('Niepoprawny format');
      DB = data;
      saveDB();
      pushNotification('📦 Baza danych zaimportowana pomyślnie', 'success');
      updateProfileSelect();
      renderAll();
    } catch(err){
      pushNotification('❌ Błąd importu: ' + err.message, 'error');
    }
  };
  reader.readAsText(file);
}

/* ---------- KALKULATOR KREDYTOWY ---------- */
function calculateLoanPayment(amount, rate, months){
  const monthlyRate = rate / 12;
  if(monthlyRate === 0) return amount / months;
  const payment = amount * monthlyRate * Math.pow(1 + monthlyRate, months) / (Math.pow(1 + monthlyRate, months) - 1);
  const totalCost = payment * months;
  return {
    monthlyPayment: round2(payment),
    totalCost: round2(totalCost),
    totalInterest: round2(totalCost - amount)
  };
}

function getLoanAmortizationSchedule(amount, rate, months){
  const schedule = [];
  let remaining = amount;
  const monthlyRate = rate / 12;
  const monthlyPayment = calculateLoanPayment(amount, rate, months).monthlyPayment;
  
  for(let i = 1; i <= months; i++){
    const interest = remaining * monthlyRate;
    const principal = monthlyPayment - interest;
    remaining = Math.max(0, remaining - principal);
    schedule.push({
      month: i,
      payment: round2(monthlyPayment),
      principal: round2(principal),
      interest: round2(interest),
      remaining: round2(remaining)
    });
    if(remaining <= 0) break;
  }
  return schedule;
  }

/* ---------- TOAST ---------- */
function showToast(message, kind){
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = `toast ${kind || 'info'}`;
  toast.textContent = message;
  container.appendChild(toast);
  
  setTimeout(() => {
    toast.style.opacity = '0';
    toast.style.transform = 'translateX(60px)';
    toast.style.transition = 'all 0.3s ease';
    setTimeout(() => {
      if(toast.parentNode) toast.remove();
    }, 300);
  }, 4000);
 }

/* ---------- ZAAWANSOWANY SYSTEM POWIADOMIEŃ ---------- */
function sendAlert(userId, type, message, priority){
  const alert = {
    id: 'alert_' + Date.now() + '_' + Math.floor(Math.random() * 1000),
    userId: userId,
    type: type || 'info', // info, warning, danger, success
    message: message,
    priority: priority || 'normal', // low, normal, high, critical
    timestamp: Date.now(),
    read: false,
    acknowledged: false
  };
  
  // Zapisz w globalnym logu
  DB.globalEventLog = DB.globalEventLog || [];
  DB.globalEventLog.unshift(alert);
  if(DB.globalEventLog.length > 500) DB.globalEventLog.length = 500;
  
  // Dodaj do notyfikacji użytkownika
  pushNotification(message, type);
  
  // Jeśli krytyczne - pokaż toast z wyższym priorytetem
  if(priority === 'critical'){
    showToast(`🚨 KRYTYCZNE: ${message}`, 'error');
  } else if(priority === 'high'){
    showToast(`⚠️ ${message}`, 'warn');
  }
  
  saveDB();
  return alert;
}

/* ---------- SPRAWDZANIE ALERTÓW ---------- */
function checkAlerts(userId){
  const user = getUser(userId);
  const alerts = [];
  
  // Sprawdź niskie saldo
  if(user.balance < 100){
    alerts.push(sendAlert(userId, 'warning', `Niskie saldo konta: ${fmtMoney(user.balance)}`, 'high'));
  }
  
  // Sprawdź wysokie zadłużenie
  const totalDebt = user.loans.reduce((sum, l) => sum + l.remaining, 0);
  if(totalDebt > user.balance * 2 && user.balance > 0){
    alerts.push(sendAlert(userId, 'warning', `Wysokie zadłużenie: ${fmtMoney(totalDebt)}`, 'high'));
  }
  
  // Sprawdź nieopłacone rachunki
  const unpaid = user.bills.filter(b => !b.paid);
  if(unpaid.length > 0){
    const totalUnpaid = unpaid.reduce((sum, b) => sum + b.amount, 0);
    alerts.push(sendAlert(userId, 'warning', `${unpaid.length} nieopłaconych rachunków (${fmtMoney(totalUnpaid)})`, 'normal'));
  }
  
  // Sprawdź cel osiągnięty w >80%
  user.goals.forEach(goal => {
    if(!goal.completed && goal.current / goal.target > 0.8){
      alerts.push(sendAlert(userId, 'success', `Cel "${goal.name}" osiągnięty w ${(goal.current/goal.target*100).toFixed(0)}%`, 'normal'));
    }
  });
  
  // Sprawdź niski scoring
  if(user.creditScore < 30){
    alerts.push(sendAlert(userId, 'danger', `Bardzo niski scoring kredytowy: ${user.creditScore}%`, 'critical'));
  }
  
  // Sprawdź brak aktywnych prac
  if(user.jobs.filter(j => j.active).length === 0 && user.balance < 5000){
    alerts.push(sendAlert(userId, 'warning', `Brak aktywnych prac - ryzyko finansowe`, 'high'));
  }
  
  // Sprawdź wysokie oszczędności - pozytywny alert
  if(user.savings > 50000){
    alerts.push(sendAlert(userId, 'success', `Imponujące oszczędności: ${fmtMoney(user.savings)} 🎉`, 'normal'));
  }
  
  // Sprawdź dywidendy
  const totalDiv = Object.entries(user.portfolio.stocks).reduce((sum, [sym, qty]) => {
    const asset = DB.market.stocks.find(s => s.sym === sym);
    return sum + (asset ? asset.price * 0.005 * qty : 0);
  }, 0);
  if(totalDiv > 100){
    alerts.push(sendAlert(userId, 'success', `Przewidywane dywidendy: ${fmtMoney(totalDiv)}/mies.`, 'low'));
  }
  
  return alerts;
}

/* ---------- WYKRES MAJĄTKU NETTO ---------- */
function renderNetWorthChart(user){
  const canvas = document.getElementById('netWorthChart');
  if(!canvas) return;
  
  const ctx = canvas.getContext('2d');
  
  // Pobierz dane z historii transakcji
  const history = user.history || [];
  const netWorthData = [];
  const labels = [];
  
  // Ogranicz do ostatnich 30 punktów
  const dataPoints = history.slice(0, 30).reverse();
  
  dataPoints.forEach(t => {
    if(t.balanceAfter !== undefined){
      const total = (t.balanceAfter || 0) + (t.savingsAfter || 0);
      netWorthData.push(total);
      labels.push(t.simMonth || '');
    }
  });
  
  // Jeśli brak danych, użyj przykładowych
  if(netWorthData.length < 2){
    const currentNW = calcNetWorth(user);
    for(let i = 6; i >= 0; i--){
      netWorthData.push(currentNW * (0.8 + i * 0.03));
      labels.push(`-${i}m`);
    }
  }
  
  new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{
        label: 'Majątek netto',
        data: netWorthData,
        borderColor: '#10B981',
        backgroundColor: 'rgba(16, 185, 129, 0.1)',
        fill: true,
        tension: 0.4,
        pointBackgroundColor: '#10B981',
        pointRadius: 3
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          labels: { color: '#8B96AB' }
        }
      },
      scales: {
        y: {
          ticks: {
            color: '#8B96AB',
            callback: function(value) {
              return fmtMoney(value, {alreadyConverted: true});
            }
          },
          grid: { color: 'rgba(255,255,255,0.05)' }
        },
        x: {
          ticks: { color: '#8B96AB' },
          grid: { color: 'rgba(255,255,255,0.05)' }
        }
      }
    }
  });
}

/* ---------- WYKRES STRUKTURY WYDATKÓW ---------- */
function renderExpenseChart(user){
  const canvas = document.getElementById('expenseChart');
  if(!canvas) return;
  
  const ctx = canvas.getContext('2d');
  
  // Grupuj wydatki według kategorii
  const expenses = {};
  const history = user.history || [];
  
  history.forEach(t => {
    if(t.kind === 'expense' && t.amountPLN < 0){
      const category = t.category || 'inne';
      if(!expenses[category]) expenses[category] = 0;
      expenses[category] += Math.abs(t.amountPLN);
    }
  });
  
  const categories = Object.keys(expenses);
  const values = Object.values(expenses);
  
  // Kolory dla kategorii
  const colors = [
    '#10B981', '#F0B93F', '#EF4444', '#4B9FE1', '#8B5CF6',
    '#EC4899', '#14B8A6', '#F97316', '#6366F1', '#84CC16'
  ];
  
  // Jeśli brak danych, użyj przykładowych
  if(categories.length === 0){
    const sampleCategories = ['Jedzenie', 'Rachunki', 'Kredyt', 'Ubezpieczenie', 'Inne'];
    const sampleValues = [800, 600, 400, 200, 300];
    const sampleColors = ['#10B981', '#F0B93F', '#EF4444', '#4B9FE1', '#8B5CF6'];
    
    new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: sampleCategories,
        datasets: [{
          data: sampleValues,
          backgroundColor: sampleColors,
          borderColor: '#121729',
          borderWidth: 2
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: {
            position: 'bottom',
            labels: { color: '#8B96AB' }
          }
        }
      }
    });
    return;
  }
  
  new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: categories.map(c => CATEGORY_META[c]?.label || c),
      datasets: [{
        data: values,
        backgroundColor: colors.slice(0, categories.length),
        borderColor: '#121729',
        borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          position: 'bottom',
          labels: { color: '#8B96AB' }
        }
      }
    }
  });
}

/* ---------- ZARZĄDZANIE PORTFELEM ---------- */
function getPortfolioSummary(userId){
  const user = getUser(userId);
  const summary = {
    totalValue: 0,
    crypto: { value: 0, count: 0 },
    stocks: { value: 0, count: 0 },
    realEstate: { value: 0, count: 0 },
    bonds: { value: 0, count: 0 },
    deposits: { value: 0, count: 0 },
    startups: { value: 0, count: 0 },
    commodities: { value: 0, count: 0 },
    ppk: 0
  };
  
  // Krypto
  Object.entries(user.portfolio.crypto).forEach(([sym, qty]) => {
    const asset = DB.market.crypto.find(c => c.sym === sym);
    if(asset){
      const value = asset.price * qty;
      summary.crypto.value += value;
      summary.crypto.count++;
      summary.totalValue += value;
    }
  });
  
  // Akcje
  Object.entries(user.portfolio.stocks).forEach(([sym, qty]) => {
    const asset = DB.market.stocks.find(s => s.sym === sym);
    if(asset){
      const value = asset.price * qty;
      summary.stocks.value += value;
      summary.stocks.count++;
      summary.totalValue += value;
    }
  });
  
  // Nieruchomości
  user.portfolio.realEstate.forEach(p => {
    summary.realEstate.value += p.value;
    summary.realEstate.count++;
    summary.totalValue += p.value;
  });
  
  // Obligacje
  user.portfolio.bonds.forEach(b => {
    summary.bonds.value += b.amount;
    summary.bonds.count++;
    summary.totalValue += b.amount;
  });
  
  // Lokaty
  user.portfolio.deposits.forEach(d => {
    summary.deposits.value += d.amount;
    summary.deposits.count++;
    summary.totalValue += d.amount;
  });
  
  // Startupy
  user.portfolio.startups.forEach(s => {
    if(!s.resolved){
      summary.startups.value += s.invested;
      summary.startups.count++;
      summary.totalValue += s.invested;
    }
  });
  
  // Surowce
  const goldValue = user.portfolio.goldOz * DB.market.commodities.gold.price;
  const oilValue = user.portfolio.oilBarrels * DB.market.commodities.oil.price;
  if(goldValue > 0){
    summary.commodities.value += goldValue;
    summary.commodities.count++;
    summary.totalValue += goldValue;
  }
  if(oilValue > 0){
    summary.commodities.value += oilValue;
    summary.commodities.count++;
    summary.totalValue += oilValue;
  }
  
  // PPK
  summary.ppk = user.portfolio.ppk || 0;
  summary.totalValue += summary.ppk;
  
  return summary;
}

/* ---------- PPK (PRYWATNY PROGRAM KAPITAŁOWY) ---------- */
function contributeToPPK(userId, amount){
  const user = getUser(userId);
  if(user.balance < amount) return {ok: false, error: 'Niewystarczające środki'};
  
  // Rząd dopłaca 50% do 500 PLN miesięcznie
  const governmentMatch = Math.min(amount * 0.5, 250);
  const totalContribution = amount + governmentMatch;
  
  user.balance = round2(user.balance - amount);
  user.portfolio.ppk = (user.portfolio.ppk || 0) + totalContribution;
  
  addTransaction(userId, 'inne', amount, `Wpłata do PPK (dopłata rządu: ${fmtMoney(governmentMatch)})`);
  pushNotification(`🏦 Wpłacono do PPK: ${fmtMoney(amount)} + dopłata ${fmtMoney(governmentMatch)}`, 'success');
  saveDB();
  return {ok: true, total: totalContribution, governmentMatch: governmentMatch};
}

function withdrawFromPPK(userId){
  const user = getUser(userId);
  const ppk = user.portfolio.ppk || 0;
  if(ppk <= 0) return {ok: false, error: 'Brak środków na PPK'};
  
  // Kara 10% za wcześniejszą wypłatę
  const penalty = ppk * 0.1;
  const amount = ppk - penalty;
  
  user.balance = round2(user.balance + amount);
  user.portfolio.ppk = 0;
  
  addTransaction(userId, 'przelew_in', amount, `Wypłata z PPK (kara: ${fmtMoney(penalty)})`);
  pushNotification(`💰 Wypłacono z PPK: ${fmtMoney(amount)} (kara ${fmtMoney(penalty)})`, 'warn');
  saveDB();
  return {ok: true, amount: amount, penalty: penalty};
}

/* ---------- DEBET ---------- */
function setupOverdraft(userId, limit){
  const user = getUser(userId);
  const currentLimit = user.overdraftLimit || 0;
  
  if(limit < 0) return {ok: false, error: 'Limit nie może być ujemny'};
  if(limit > 10000) return {ok: false, error: 'Maksymalny limit debetu to 10 000 PLN'};
  
  user.overdraftLimit = limit;
  user.overdraftInterest = 0.15; // 15% rocznie
  saveDB();
  pushNotification(`💳 Ustawiono limit debetu: ${fmtMoney(limit)}`, 'info');
  return {ok: true, limit: limit};
}

function checkOverdraft(userId){
  const user = getUser(userId);
  const limit = user.overdraftLimit || 0;
  
  if(user.balance < 0){
    const overdraft = Math.abs(user.balance);
    if(overdraft > limit){
      // Przekroczono limit
      const penalty = overdraft * 0.05;
      user.balance = round2(user.balance - penalty);
      addTransaction(userId, 'kara', penalty, `Kara za przekroczenie limitu debetu`);
      pushNotification(`🚨 Przekroczono limit debetu! Kara: ${fmtMoney(penalty)}`, 'error');
      saveDB();
      return {ok: false, error: 'Przekroczono limit debetu', penalty: penalty};
    } else {
      // Nalicz odsetki
      const monthlyInterest = user.overdraftInterest / 12;
      const interest = overdraft * monthlyInterest;
      user.balance = round2(user.balance - interest);
      addTransaction(userId, 'odsetki', interest, `Odsetki od debetu`);
      saveDB();
      return {ok: true, interest: interest};
    }
  }
  return {ok: true, overdraft: 0};
}

/* ---------- ROLI I UPRAWNIENIA ---------- */
function getUserRole(userId){
  const user = getUser(userId);
  return user.role || 'Członek';
}

function isHeadOfFamily(userId){
  return userId === 'u_head';
}

function canPerformAction(userId, action){
  const user = getUser(userId);
  
  // Głowa rodziny ma wszystkie uprawnienia
  if(isHeadOfFamily(userId)) return {ok: true, reason: 'Głowa rodziny'};
  
  // Sprawdź uprawnienia dla roli
  const rolePermissions = {
    'Małżonka': ['view', 'transfer', 'pay_bills', 'add_goal', 'invest_small'],
    'Syn': ['view', 'pay_bills', 'add_goal'],
    'Córka': ['view', 'pay_bills', 'add_goal'],
    'Członek': ['view']
  };
  
  const role = user.role || 'Członek';
  const permissions = rolePermissions[role] || rolePermissions['Członek'];
  
  if(permissions.includes(action)){
    return {ok: true, reason: `Rola "${role}" pozwala na tę akcję`};
  }
  
  return {ok: false, reason: `Rola "${role}" nie ma uprawnień do tej akcji`};
}

/* ---------- ZABEZPIECZENIE AKCJI ---------- */
function secureAction(action, ...args){
  const userId = DB.currentUserId;
  const permission = canPerformAction(userId, action);
  
  if(!permission.ok){
    showToast(`🚫 Brak uprawnień: ${permission.reason}`, 'error');
    return {ok: false, error: permission.reason};
  }
  
  // Wykonaj akcję
  switch(action){
    case 'transfer':
      return transferBetweenUsers(...args);
    case 'pay_bills':
      return payBill(...args);
    case 'add_goal':
      return addGoal(...args);
    case 'invest_small':
      if(args[2] > 5000){
        showToast(`🚫 Inwestycja powyżej 5000 PLN wymaga zgody głowy rodziny`, 'error');
        return {ok: false, error: 'Kwota przekracza limit dla tej roli'};
      }
      return buyCrypto(...args);
    default:
      return {ok: false, error: 'Nieznana akcja'};
  }
}

/* ---------- NADPISANIE FUNKCJI TRANSFERU Z ZABEZPIECZENIEM ---------- */
const originalTransfer = transferBetweenUsers;
transferBetweenUsers = function(fromId, toId, amount, note){
  // Sprawdź uprawnienia
  const permission = canPerformAction(fromId, 'transfer');
  if(!permission.ok){
    showToast(`🚫 ${permission.reason}`, 'error');
    return {ok: false, error: permission.reason};
  }
  return originalTransfer(fromId, toId, amount, note);
};

/* ---------- ZABEZPIECZENIE DUŻYCH TRANSAKCJI ---------- */
function secureLargeTransaction(userId, amount, action){
  const user = getUser(userId);
  
  // Jeśli kwota > 5000 i nie jest głową rodziny
  if(amount > 5000 && !isHeadOfFamily(userId)){
    // Wysyłamy prośbę do głowy rodziny
    const head = getUser('u_head');
    if(head){
      pushNotification(`👑 ${user.name} prosi o zgodę na transakcję ${fmtMoney(amount)}: ${action}`, 'warn');
      showToast(`👑 Wysłano prośbę do głowy rodziny o zatwierdzenie`, 'info');
      return {ok: false, pending: true, message: 'Wymaga zgody głowy rodziny'};
    }
  }
  return {ok: true};
  }

  });
}

window.showModal = function(html){
  const overlay = document.getElementById('modalOverlay');
  const body = document.getElementById('modalBody');
  if(!overlay || !body) return;
  body.innerHTML = html;
  overlay.classList.add('open');
};

window.closeModal = function(){
  const overlay = document.getElementById('modalOverlay');
  if(overlay) overlay.classList.remove('open');
};

// 6. EVENT LISTENERY
// =============================================================

document.addEventListener('DOMContentLoaded', function(){
  // ===== SIDEBAR COLLAPSE =====
  const collapseBtn = document.getElementById('collapseBtn');
  if(collapseBtn){
    collapseBtn.addEventListener('click', function(){
      document.getElementById('sidebar').classList.toggle('collapsed');
      const isCollapsed = document.getElementById('sidebar').classList.contains('collapsed');
      this.innerHTML = isCollapsed ? '⟩⟩ <span class="sidebar-footer-text">Rozwiń</span>' : '⟨⟨ <span class="sidebar-footer-text">Zwiń</span>';
    });
  }
  
  // ===== MOTYW =====
  const themeBtn = document.getElementById('themeToggleBtn');
  if(themeBtn){
    themeBtn.addEventListener('click', function(){
      document.body.classList.toggle('light-mode');
      const isLight = document.body.classList.contains('light-mode');
      DB.theme = isLight ? 'light' : 'dark';
      saveDB();
      this.textContent = isLight ? '☀️' : '🌙';
      window.showToast(isLight ? '☀️ Jasny motyw' : '🌙 Ciemny motyw', 'info');
    });
  }
  
  // ===== WALUTA =====
  const currencySelect = document.getElementById('currencySelect');
  if(currencySelect){
    currencySelect.value = DB.displayCurrency || 'PLN';
    currencySelect.addEventListener('change', function(){
      DB.displayCurrency = this.value;
      saveDB();
      window.renderAll();
    });
  }
  
  // ===== PROFIL =====
  const profileSelect = document.getElementById('profileSelect');
  if(profileSelect){
    profileSelect.addEventListener('change', function(){
      const userId = this.value;
      if(userId && DB.users[userId]){
        DB.currentUserId = userId;
        saveDB();
        const user = getCurrentUser();
        document.getElementById('topAvatar').textContent = user.initials;
        window.renderAll();
        window.showToast(`👤 Przełączono na: ${user.name}`, 'info');
      }
    });
  }
  
  // ===== PRZYCISK MIESIĄCA =====
  const monthBtn = document.getElementById('advanceMonthBtn');
  if(monthBtn){
    monthBtn.addEventListener('click', function(){
      window.advanceMonth();
      window.renderAll();
      window.showToast('📅 Przesunięto miesiąc', 'info');
    });
  }
  
  // ===== NOTYFIKACJE =====
  const notifBtn = document.getElementById('notifBtn');
  if(notifBtn){
    notifBtn.addEventListener('click', function(){
      const modal = document.getElementById('modalOverlay');
      const body = document.getElementById('modalBody');
      if(!modal || !body) return;
      
      let html = `<div class="modal-title">🔔 Powiadomienia</div>`;
      if(DB.notifications.length === 0){
        html += `<div class="text-muted text-center" style="padding:20px;">Brak powiadomień</div>`;
      } else {
        DB.notifications.slice(0, 30).forEach(n => {
          const date = new Date(n.ts).toLocaleString('pl-PL');
          const icon = n.kind === 'success' ? '✅' : n.kind === 'error' ? '❌' : n.kind === 'warn' ? '⚠️' : 'ℹ️';
          html += `
          <div style="padding:10px 0;border-bottom:1px solid var(--panel-border);">
            <div>${icon} ${n.message}</div>
            <div style="font-size:11px;color:var(--muted);">${date}</div>
          </div>`;
          n.read = true;
        });
        document.getElementById('notifDot').style.display = 'none';
        saveDB();
      }
      body.innerHTML = html;
      modal.classList.add('open');
    });
  }
  
  // ===== MODAL CLOSE =====
  document.getElementById('modalClose')?.addEventListener('click', window.closeModal);
  document.getElementById('modalOverlay')?.addEventListener('click', function(e){
    if(e.target === this) window.closeModal();
  });
  
  // ===== NAWIGACJA =====
  document.querySelectorAll('.nav-item').forEach(el => {
    el.addEventListener('click', function(){
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      this.classList.add('active');
      
      const view = this.dataset.view;
      switch(view){
        case 'dashboard': window.renderAll(); break;
        case 'family': window.renderFamilyView(); break;
        case 'transactions': window.renderTransactionsView(); break;
        case 'investments': window.renderInvestmentsView(); break;
        case 'market': window.renderMarketView(); break;
        case 'loans': window.renderLoansView(); break;
        case 'insurance': window.renderInsuranceView(); break;
        case 'bills': window.renderBillsView(); break;
        case 'goals': window.renderGoalsView(); break;
        case 'achievements': window.renderAchievementsView(); break;
        case 'settings': window.renderSettingsView(); break;
        case 'portfolio': window.renderPortfolioView(); break;
        case 'limits': window.renderLimitsView(); break;
        case 'roles': window.renderRolesView(); break;
        case 'converter': window.renderCurrencyConverter(); break;
        case 'statements': window.renderStatementsView(); break;
        case 'events': window.renderEventsView(); break;
        case 'standingorders': window.renderStandingOrdersView(); break;
        case 'stats': window.renderStatsView(); break;
        case 'alerts': window.renderAlertsView(); break;
        default: window.renderAll();
      }
    });
  });
  
  // ===== URUCHOM =====
  window.renderAll();
  window.showToast('🚀 Apex Bank Pro v5.0 gotowy!', 'success');
  
  // Sprawdź nieprzeczytane notyfikacje
  const unread = DB.notifications.filter(n => !n.read).length;
  if(unread > 0){
    document.getElementById('notifDot').style.display = 'block';
  }
  
  // Aktualizuj awatar
  const user = getCurrentUser();
  if(user) document.getElementById('topAvatar').textContent = user.initials;
});

// 7. POPRAWA TOAST
// =============================================================

window.showToast = function(message, kind){
  const container = document.getElementById('toastContainer');
  if(!container) return;
  const toast = document.createElement('div');
  toast.className = `toast ${kind || 'info'}`;
  toast.textContent = message;
  container.appendChild(toast);
  setTimeout(() => {
    toast.style.opacity = '0';
    toast.style.transform = 'translateX(60px)';
    toast.style.transition = 'all 0.3s ease';
    setTimeout(() => { if(toast.parentNode) toast.remove(); }, 300);
  }, 4000);
};
