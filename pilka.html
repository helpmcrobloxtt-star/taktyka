<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>PL Manager PRO 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>PL MANAGER 2026</h1>
        <div id="status-bar">Klub: <span id="club-name">-</span> | Budżet: <span id="budget-val">0</span> €</div>
    </header>
    <main>
        <div class="column">
            <div class="card">
                <h2>Taktyka (FIFA Style)</h2>
                <label>Styl: <select id="style-select"></select></label>
                <input type="range" id="width-range" title="Szerokość">
                <button onclick="Tactics.apply()">Zatwierdź</button>
            </div>
            <div class="card">
                <h2>Transfery</h2>
                <div id="transfer-list"></div>
            </div>
        </div>
        <div class="column">
            <div class="card">
                <h2>Tabela Premier League</h2>
                <table id="league-table"><thead><tr><th>Klub</th><th>PKT</th></tr></thead><tbody id="table-body"></tbody></table>
            </div>
        </div>
    </main>
    <div id="match-zone" class="card">
        <button onclick="MatchEngine.start()">ROZPOCZNIJ MECZ (90 MIN)</button>
        <div id="match-live"></div>
    </div>

    <script src="data.js"></script>
    <script src="tactics.js"></script>
    <script src="transfer.js"></script>
    <script src="match.js"></script>
    <script src="ui.js"></script>
</body>
</html>
