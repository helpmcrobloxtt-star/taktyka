<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Ligi & Terminarzy Pro</title>
    <style>
        body { background-color: #0f172a; color: #ffffff; font-family: Arial, sans-serif; margin: 0; padding: 15px; }
        .container { max-width: 1200px; margin: 0 auto; background-color: #1e293b; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        h2, h3 { color: #38bdf8; text-align: center; margin-top: 0; }
        .btn { background-color: #2563eb; color: white; border: none; padding: 8px 14px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 13px; display: inline-flex; align-items: center; gap: 5px; }
        .btn:hover { background-color: #1d4ed8; }
        .btn-success { background-color: #16a34a; }
        .btn-success:hover { background-color: #15803d; }
        .btn-danger { background-color: #991b1b; }
        .btn-danger:hover { background-color: #7f1d1d; }
        .btn-tab { background-color: #475569; padding: 10px 15px; border-radius: 6px; text-decoration: none; color: white; font-weight: bold; font-size: 13px; }
        
        .flex-tabs { display: flex; gap: 8px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
        .grid-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media(max-width: 900px) { .grid-layout { grid-template-columns: 1fr; } }
        
        .box { background-color: #0f172a; padding: 15px; border-radius: 6px; border: 1px solid #334155; height: fit-content; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        th, td { padding: 8px; text-align: left; border-bottom: 1px solid #334155; vertical-align: middle; }
        th { background-color: #1e293b; color: #38bdf8; }
        
        input[type="text"], input[type="number"] { background-color: #1e293b; color: white; border: 1px solid #475569; padding: 6px; border-radius: 4px; width: 100%; box-sizing: border-box; font-size: 13px; }
        
        .round-box { background: #1e293b; padding: 12px; border-radius: 6px; margin-bottom: 15px; border-left: 4px solid #3b82f6; }
        .round-header { display: flex; justify-content: space-between; align-items: center; font-weight: bold; margin-bottom: 10px; border-bottom: 1px solid #475569; padding-bottom: 5px; color: #38bdf8; }
        
        .match-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; background: #0f172a; padding: 8px; border-radius: 4px; }
        .match-row input { width: 45px; text-align: center; font-weight: bold; color: #51da59; background-color: #1e293b; border: 1px solid #475569; border-radius: 4px; }
        .match-team { flex: 1; display: flex; align-items: center; gap: 6px; }
        .match-team.right { justify-content: flex-end; text-align: right; }
        
        textarea { width: 100%; height: 180px; background-color: #0f172a; color: #51da59; border: 1px solid #475569; font-family: monospace; padding: 10px; border-radius: 6px; resize: vertical; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="container">
    <div class="flex-tabs">
        <a href="index.html" class="btn-tab">⬅️ Tablica Taktyczna</a>
        <button class="btn" onclick="loadTemplate('ligue1')">🇫🇷 Ligue 1</button>
        <button class="btn" onclick="loadTemplate('ekstraklasa')">🇵🇱 Ekstraklasa</button>
        <button class="btn" onclick="loadTemplate('premier')">🏴󠁧󠁢󠁥󠁮󠁧󠁿 Premier League</button>
        <button class="btn" onclick="loadTemplate('la_liga')">🇪🇸 La Liga</button>
        <button class="btn" style="background-color: #6d28d9;" onclick="loadTemplate('custom')">🛠️ Własna</button>
    </div>

    <h2>🏆 Generator Rozgrywek i Tabel RP (Sezon 26/27)</h2>

    <div class="grid-layout">
        <div class="box">
            <h3>⚙️ Konfiguracja Ligi</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px;">
                <div>
                    <label style="font-size:12px; color:#94a3b8;">Liczba rund (1-4):</label>
                    <input type="number" id="league-rounds" value="1" min="1" max="4">
                </div>
                <div>
                    <label style="font-size:12px; color:#94a3b8;">Emotka Ligi:</label>
                    <input type="text" id="league-emoji" value="⚽">
                </div>
            </div>

            <h3>👥 Lista Drużyn (System A1-Ax)</h3>
            <div style="max-height: 380px; overflow-y: auto; border: 1px solid #334155; border-radius: 4px; padding: 5px;">
                <table>
                    <thead>
                        <tr>
                            <th style="width:15%">Kod</th>
                            <th>Nazwa Klubu</th>
                            <th style="width:20%">Emoji</th>
                            <th style="width:15%">Usuń</th>
                        </tr>
                    </thead>
                    <tbody id="teams-tbody"></tbody>
                </table>
            </div>
            <div style="margin-top: 12px; display: flex; gap: 8px;">
                <button class="btn" onclick="addNewTeamRow()">➕ Dodaj Drużynę</button>
                <button class="btn btn-success" onclick="generateBergerSchedule()">🔄 Generuj Terminarz</button>
            </div>
        </div>

        <div class="box">
            <h3>📊 Tabela Ligowa</h3>
            <div style="max-height: 480px; overflow-y: auto;">
                <table>
                    <thead>
                        <tr>
                            <th style="width:10%; text-align:center">Poz</th>
                            <th>Klub</th>
                            <th style="text-align:center; width:12%">M</th>
                            <th style="text-align:center; width:15%">PKT</th>
                            <th style="text-align:center; width:20%">Bramki</th>
                        </tr>
                    </thead>
                    <tbody id="standings-tbody">
                        <tr><td colspan="5" style="text-align:center; color:#475569;">Brak danych. Wygeneruj terminarz.</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="box" style="margin-top: 20px;">
        <h3>📅 Terminarz Spotkań oraz Wprowadzanie Wyników</h3>
        <div style="display: flex; gap: 10px; margin-bottom: 15px; justify-content: center;">
            <button class="btn" style="background-color: #d97706;" onclick="shiftRoundOrder()">🔀 Zamień Kolejki Miejscami</button>
        </div>
        <div id="schedule-ui-container"></div>
    </div>

    <div class="box" style="margin-top: 20px;">
        <h3>📋 Eksporter na Discord</h3>
        <button class="btn btn-success" style="width: 100%; padding: 12px; margin-bottom: 10px; font-size: 14px;" onclick="copyToClipboard()">📋 Kopiuj Gotowy Tekst do Schowka</button>
        <textarea id="discord-output-text" readonly placeholder="Tekst wygeneruje się sam po uzupełnieniu terminarza..."></textarea>
    </div>
</div>

<script>
    const leaguePresets = {
        ligue1: {
            emoji: "🇫🇷",
            teams: [
                { name: "Paris FC", logo: "🔵" }, { name: "Olympique Lyonnais", logo: "🦁" },
                { name: "Olympique Marseille", logo: "⚪" }, { name: "PSG", logo: "🔴" },
                { name: "Le Havre", logo: "👕" }, { name: "FC Lorient", logo: "🐟" },
                { name: "Lille", logo: "🐕" }, { name: "Toulouse", logo: "😈" },
                { name: "RC Lens", logo: "🟥" }, { name: "Strasbourg", logo: "💙" },
                { name: "Rennes", logo: "🖤" }, { name: "Le Mans", logo: "🐴" },
                { name: "Angers", logo: "🦓" }, { name: "Auxerre", logo: "💎" },
                { name: "Stade Brestois", logo: "🏴‍☠️" }, { name: "Troyes", logo: "🔵" },
                { name: "Monaco", logo: "👑" }, { name: "Nice", logo: "🦅" }
            ]
        },
        ekstraklasa: {
            emoji: "🇵🇱",
            teams: [
                { name: "Lech Poznań", logo: "🔵" }, { name: "Legia Warszawa", logo: "🟢" },
                { name: "Jagiellonia", logo: "🟡" }, { name: "Raków Częstochowa", logo: "🔴" },
                { name: "Pogoń Szczecin", logo: "🔵" }, { name: "Górnik Zabrze", logo: "⚪" },
                { name: "Widzew Łódź", logo: "🟥" }, { name: "Śląsk Wrocław", logo: "🟢" }
            ]
        },
        premier: {
            emoji: "🏴󠁧󠁢󠁥󠁮󠁧󠁿",
            teams: [
                { name: "Manchester City", logo: "🔵" }, { name: "Arsenal", logo: "🔴" },
                { name: "Liverpool", logo: "🔴" }, { name: "Aston Villa", logo: "🦁" },
                { name: "Tottenham", logo: "⚪" }, { name: "Chelsea", logo: "🔵" },
                { name: "Manchester United", logo: "😈" }, { name: "Newcastle", logo: "⚫" }
            ]
        },
        la_liga: {
            emoji: "🇪🇸",
            teams: [
                { name: "Real Madrid", logo: "⚪" }, { name: "FC Barcelona", logo: "🔵" },
                { name: "Girona", logo: "🔴" }, { name: "Atletico Madrid", logo: "🔴" },
                { name: "Athletic Bilbao", logo: "🦁" }, { name: "Real Sociedad", logo: "🔵" }
            ]
        },
        custom: {
            emoji: "⚽",
            teams: [
                { name: "Klub A", logo: "⚽" }, { name: "Klub B", logo: "⚽" },
                { name: "Klub C", logo: "⚽" }, { name: "Klub D", logo: "⚽" }
            ]
        }
    };

    let activeTeams = [];
    let currentSchedule = [];

    function loadTemplate(key) {
        const data = leaguePresets[key];
        document.getElementById('league-emoji').value = data.emoji;
        activeTeams = JSON.parse(JSON.stringify(data.teams));
        renderTeamsInputTable();
        currentSchedule = [];
        document.getElementById('schedule-ui-container').innerHTML = '';
        updateStandingsTable();
    }

    function renderTeamsInputTable() {
        const tbody = document.getElementById('teams-tbody');
        tbody.innerHTML = '';
        activeTeams.forEach((team, index) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><strong>A${index + 1}</strong></td>
                <td><input type="text" value="${team.name}" onchange="modifyTeamData(${index}, 'name', this.value)"></td>
                <td><input type="text" value="${team.logo}" onchange="modifyTeamData(${index}, 'logo', this.value)"></td>
                <td style="text-align:center;"><button class="btn btn-danger" style="padding:4px 8px;" onclick="removeTeamRow(${index})">🗑️</button></td>
            `;
            tbody.appendChild(tr);
        });
    }

    function modifyTeamData(idx, key, val) {
        activeTeams[idx][key] = val;
        updateStandingsTable();
        renderScheduleInterface();
        buildDiscordOutput();
    }

    function addNewTeamRow() {
        activeTeams.push({ name: `Klub A${activeTeams.length + 1}`, logo: "⚽" });
        renderTeamsInputTable();
    }

    function removeTeamRow(idx) {
        activeTeams.splice(idx, 1);
        renderTeamsInputTable();
    }

    function generateBergerSchedule() {
        if (activeTeams.length % 2 !== 0) {
            alert("⚠️ Do systemu parowania wymagana jest PARZYSTA liczba klubów!");
            return;
        }

        const teamCount = activeTeams.length;
        const roundsInCycle = teamCount - 1;
        const roundMultiplier = parseInt(document.getElementById('league-rounds').value) || 1;
        
        currentSchedule = [];
        let globalRoundIndex = 1;
        let indexMap = activeTeams.map((_, i) => i);

        for (let cycle = 0; cycle < roundMultiplier; cycle++) {
            let workingMap = [...indexMap];
            for (let round = 0; round < roundsInCycle; round++) {
                let roundPairings = [];
                for (let i = 0; i < teamCount / 2; i++) {
                    let home = workingMap[i];
                    let away = workingMap[teamCount - 1 - i];
                    if (cycle % 2 === 1) {
                        let tmp = home; home = away; away = tmp;
                    }
                    roundPairings.push({ homeId: home, awayId: away, homeScore: "", awayScore: "" });
                }
                currentSchedule.push({ roundNum: globalRoundIndex++, matches: roundPairings });
                workingMap.splice(1, 0, workingMap.pop());
            }
        }
        renderScheduleInterface();
        updateStandingsTable();
        buildDiscordOutput();
    }

    function renderScheduleInterface() {
        const host = document.getElementById('schedule-ui-container');
        host.innerHTML = '';

        currentSchedule.forEach((round, rIndex) => {
            const block = document.createElement('div');
            block.className = 'round-box';
            let html = `<div class="round-header"><span>Kolejka ${round.roundNum}</span></div>`;

            round.matches.forEach((m, mIndex) => {
                const home = activeTeams[m.homeId] || { name: '?', logo: '⚽' };
                const away = activeTeams[m.awayId] || { name: '?', logo: '⚽' };

                html += `
                    <div class="match-row">
                        <div class="match-team"><span>${home.logo} ${home.name}</span></div>
                        <input type="text" value="${m.homeScore}" oninput="registerScore(${rIndex}, ${mIndex}, 'homeScore', this.value)">
                        <span style="color:#475569; font-weight:bold;">-</span>
                        <input type="text" value="${m.awayScore}" oninput="registerScore(${rIndex}, ${mIndex}, 'awayScore', this.value)">
                        <div class="match-team right"><span>${away.name} ${away.logo}</span></div>
                    </div>
                `;
            });
            block.innerHTML = html;
            host.appendChild(block);
        });
    }

    function registerScore(rIdx, mIdx, side, val) {
        currentSchedule[rIdx].matches[mIdx][side] = val;
        updateStandingsTable();
        buildDiscordOutput();
    }

    function shiftRoundOrder() {
        if(currentSchedule.length < 2) return alert("Brak wystarczającej liczby kolejek.");
        let targetA = parseInt(prompt(`Wpisz numer pierwszej kolejki (1-${currentSchedule.length}):`));
        let targetB = parseInt(prompt(`Wpisz numer drugiej kolejki (1-${currentSchedule.length}):`));
        
        if(!targetA || !targetB || targetA < 1 || targetA > currentSchedule.length || targetB < 1 || targetB > currentSchedule.length) {
            return alert("Nieprawidłowy wybór.");
        }

        let store = currentSchedule[targetA - 1].matches;
        currentSchedule[targetA - 1].matches = currentSchedule[targetB - 1].matches;
        currentSchedule[targetB - 1].matches = store;

        renderScheduleInterface();
        updateStandingsTable();
        buildDiscordOutput();
    }

    function updateStandingsTable() {
        let stats = activeTeams.map((t, i) => ({
            id: i, name: t.name, logo: t.logo, played: 0, pts: 0, goalsFor: 0, goalsAgainst: 0
        }));

        currentSchedule.forEach(r => {
            r.matches.forEach(m => {
                let hStr = m.homeScore.trim();
                let aStr = m.awayScore.trim();
                if (hStr !== "" && aStr !== "" && !isNaN(hStr) && !isNaN(aStr)) {
                    let h = parseInt(hStr); let a = parseInt(aStr);
                    stats[m.homeId].played++; stats[m.awayId].played++;
                    stats[m.homeId].goalsFor += h; stats[m.homeId].goalsAgainst += a;
                    stats[m.awayId].goalsFor += a; stats[m.awayId].goalsAgainst += h;
                    if (h > a) stats[m.homeId].pts += 3;
                    else if (h < a) stats[m.awayId].pts += 3;
                    else { stats[m.homeId].pts += 1; stats[m.awayId].pts += 1; }
                }
            });
        });

        stats.sort((a, b) => b.pts - a.pts || (b.goalsFor - b.goalsAgainst) - (a.goalsFor - a.goalsAgainst) || b.goalsFor - a.goalsFor);

        const tbody = document.getElementById('standings-tbody');
        tbody.innerHTML = '';

        if(stats.length === 0 || currentSchedule.length === 0) {
            tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:#475569;">Brak danych. Wygeneruj terminarz.</td></tr>`;
            return;
        }

        stats.forEach((s, idx) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td style="text-align:center"><strong>${idx + 1}</strong></td>
                <td>${s.logo} ${s.name}</td>
                <td style="text-align:center">${s.played}</td>
                <td style="text-align:center; color:#38bdf8; font-weight:bold">${s.pts}</td>
                <td style="text-align:center; color:#94a3b8">${s.goalsFor}:${s.goalsAgainst}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    function buildDiscordOutput() {
        const topEmoji = document.getElementById('league-emoji').value;
        let stringBuilder = "";

        currentSchedule.forEach(r => {
            stringBuilder += `**${r.roundNum} KOLEJKA ${topEmoji}**\n`;
            r.matches.forEach(m => {
                const home = activeTeams[m.homeId] || { name: '?', logo: '⚽' };
                const away = activeTeams[m.awayId] || { name: '?', logo: '⚽' };
                let separator = " - ";
                if(m.homeScore.trim() !== "" && m.awayScore.trim() !== "") {
                    separator = ` ${m.homeScore.trim()} - ${m.awayScore.trim()} `;
                }
                stringBuilder += `${home.logo} ${home.name}${separator}${away.name} ${away.logo}\n`;
            });
            stringBuilder += "\n";
        });
        document.getElementById('discord-output-text').value = stringBuilder.trim();
    }

    function copyToClipboard() {
        const area = document.getElementById('discord-output-text');
        area.select();
        document.execCommand('copy');
        alert('Skopiowano gotowy tekst do schowka!');
    }

    loadTemplate('ligue1');
</script>
</body>
  </html>
