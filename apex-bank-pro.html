<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apex Bank Pro v5.0</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0A0E1A;
    --bg-alt: #0D1220;
    --panel: rgba(255,255,255,0.045);
    --panel-solid: #121729;
    --panel-border: rgba(255,255,255,0.08);
    --panel-hover: rgba(255,255,255,0.07);
    --primary: #10B981;
    --primary-dim: rgba(16,185,129,0.15);
    --gold: #F0B93F;
    --gold-dim: rgba(240,185,63,0.15);
    --danger: #EF4444;
    --danger-dim: rgba(239,68,68,0.15);
    --info: #4B9FE1;
    --info-dim: rgba(75,159,225,0.15);
    --text: #E7ECF3;
    --muted: #8B96AB;
    --muted-dim: #5B6479;
    --radius: 16px;
    --radius-sm: 10px;
    --shadow: 0 8px 32px rgba(0,0,0,0.35);
    --font-display: 'Space Grotesk', sans-serif;
    --font-body: 'Inter', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    background:
      radial-gradient(ellipse 80% 50% at 20% -10%, rgba(16,185,129,0.10), transparent),
      radial-gradient(ellipse 60% 50% at 100% 0%, rgba(240,185,63,0.07), transparent),
      var(--bg);
    color:var(--text);
    font-family:var(--font-body);
    min-height:100vh;
    display:flex;
    overflow-x:hidden;
  }
  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:8px;}
  ::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.2);}
  ::selection{background:var(--primary);color:#04140D;}
  a{color:inherit;text-decoration:none;}
  button{font-family:inherit;cursor:pointer;}
  input,select{font-family:inherit;}

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.01ms !important; transition-duration:0.01ms !important;}
  }

  /* ===== LIGHT MODE ===== */
  body.light-mode{
    --bg:#F3F5F8;
    --bg-alt:#EAEDF3;
    --panel: rgba(255,255,255,0.65);
    --panel-solid: #FFFFFF;
    --panel-border: rgba(15,23,42,0.08);
    --panel-hover: rgba(15,23,42,0.04);
    --text:#131A2A;
    --muted:#5B6479;
    --muted-dim:#94A0B8;
    --shadow: 0 8px 28px rgba(30,41,59,0.08);
  }
  body.light-mode{
    background:
      radial-gradient(ellipse 80% 50% at 20% -10%, rgba(16,185,129,0.08), transparent),
      radial-gradient(ellipse 60% 50% at 100% 0%, rgba(240,185,63,0.10), transparent),
      var(--bg);
  }

  /* ===== SIDEBAR ===== */
  .sidebar{
    width:230px;
    min-width:230px;
    height:100vh;
    position:sticky;
    top:0;
    background:var(--panel-solid);
    border-right:1px solid var(--panel-border);
    display:flex;
    flex-direction:column;
    padding:22px 14px;
    z-index:100;
    transition:width .25s ease, min-width .25s ease;
  }
  .sidebar.collapsed{width:76px;min-width:76px;}
  .sidebar.collapsed .brand-text,
  .sidebar.collapsed .nav-label,
  .sidebar.collapsed .nav-section-title,
  .sidebar.collapsed .sidebar-footer-text{display:none;}
  .brand{
    display:flex;align-items:center;gap:10px;
    padding:6px 10px 22px 10px;
    font-family:var(--font-display);
  }
  .brand-mark{
    width:34px;height:34px;border-radius:10px;
    background:linear-gradient(135deg, var(--primary), var(--gold));
    display:flex;align-items:center;justify-content:center;
    font-weight:700;color:#04140D;font-size:16px;
    flex-shrink:0;
    box-shadow:0 4px 14px rgba(16,185,129,0.35);
  }
  .brand-text{font-size:17px;font-weight:700;letter-spacing:0.2px;white-space:nowrap;}
  .brand-text span{color:var(--gold);}
  .nav-section-title{
    font-size:11px;text-transform:uppercase;letter-spacing:1px;
    color:var(--muted-dim);margin:16px 10px 8px 10px;font-weight:600;
  }
  .nav-item{
    display:flex;align-items:center;gap:12px;
    padding:10px 12px;border-radius:var(--radius-sm);
    color:var(--muted);font-size:14px;font-weight:500;
    margin-bottom:2px;transition:all .18s ease;
    white-space:nowrap;overflow:hidden;position:relative;
  }
  .nav-item:hover{background:var(--panel-hover);color:var(--text);}
  .nav-item.active{
    background:var(--primary-dim);color:var(--primary);
  }
  .nav-item.active::before{
    content:'';position:absolute;left:-14px;top:50%;transform:translateY(-50%);
    width:4px;height:60%;background:var(--primary);border-radius:0 4px 4px 0;
  }
  .nav-icon{width:18px;height:18px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
  .sidebar-footer{
    margin-top:auto;padding-top:14px;border-top:1px solid var(--panel-border);
    display:flex;align-items:center;gap:10px;padding-left:10px;
  }
  .collapse-btn{
    width:100%;padding:8px;border:none;background:var(--panel-hover);
    border-radius:var(--radius-sm);color:var(--muted);font-size:12px;
    display:flex;align-items:center;justify-content:center;gap:6px;
    margin-top:10px;
  }
  .collapse-btn:hover{color:var(--text);}

  /* ===== MAIN LAYOUT ===== */
  .main-wrap{flex:1;min-width:0;display:flex;flex-direction:column;height:100vh;overflow-y:auto;}
  .topbar{
    position:sticky;top:0;z-index:90;
    display:flex;align-items:center;justify-content:space-between;
    padding:16px 28px;
    background:rgba(10,14,26,0.72);
    backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
    border-bottom:1px solid var(--panel-border);
    gap:16px;flex-wrap:wrap;
  }
  body.light-mode .topbar{background:rgba(243,245,248,0.75);}
  .topbar-left{display:flex;align-items:center;gap:14px;}
  .page-title{font-family:var(--font-display);font-size:20px;font-weight:700;}
  .page-sub{font-size:12px;color:var(--muted);margin-top:2px;}
  .topbar-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}

  .profile-switch{
    display:flex;align-items:center;gap:8px;
    background:var(--panel);border:1px solid var(--panel-border);
    padding:6px 12px 6px 6px;border-radius:999px;
    position:relative;
  }
  .avatar{
    width:30px;height:30px;border-radius:50%;
    background:linear-gradient(135deg,var(--info),var(--primary));
    display:flex;align-items:center;justify-content:center;
    font-size:13px;font-weight:700;color:#fff;
  }
  .profile-switch select{
    background:transparent;border:none;color:var(--text);font-size:13px;font-weight:600;
    outline:none;appearance:none;padding-right:14px;
  }

  .pill-select{
    background:var(--panel);border:1px solid var(--panel-border);
    color:var(--text);padding:8px 12px;border-radius:999px;font-size:13px;font-weight:600;
    outline:none;appearance:none;cursor:pointer;
  }
  .icon-btn{
    width:38px;height:38px;border-radius:50%;
    background:var(--panel);border:1px solid var(--panel-border);
    display:flex;align-items:center;justify-content:center;
    color:var(--muted);position:relative;transition:all .18s ease;
  }
  .icon-btn:hover{color:var(--text);background:var(--panel-hover);}
  .notif-dot{
    position:absolute;top:6px;right:7px;width:8px;height:8px;border-radius:50%;
    background:var(--danger);border:2px solid var(--panel-solid);
  }
  .btn-primary{
    background:linear-gradient(135deg,var(--primary),#0ea371);
    color:#04140D;border:none;padding:10px 18px;border-radius:999px;
    font-size:13px;font-weight:700;display:flex;align-items:center;gap:8px;
    box-shadow:0 4px 16px rgba(16,185,129,0.3);transition:transform .15s ease;
  }
  .btn-primary:hover{transform:translateY(-1px);}
  .btn-primary:active{transform:translateY(0);}

  .content{padding:24px 28px 60px 28px;}

  /* ===== HERO NET WORTH TICKER (SIGNATURE) ===== */
  .hero-ticker{
    position:relative;overflow:hidden;
    border-radius:20px;
    background:linear-gradient(135deg, rgba(16,185,129,0.10), rgba(240,185,63,0.05));
    border:1px solid var(--panel-border);
    padding:28px 32px;margin-bottom:22px;
    display:flex;align-items:center;justify-content:space-between;gap:24px;flex-wrap:wrap;
  }
  .hero-ticker-sparkline{position:absolute;inset:0;opacity:0.5;pointer-events:none;}
  .hero-left{position:relative;z-index:2;}
  .hero-label{font-size:12px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);font-weight:600;margin-bottom:8px;}
  .hero-value{
    font-family:var(--font-mono);font-size:44px;font-weight:700;
    display:flex;align-items:baseline;gap:10px;letter-spacing:-1px;
  }
  .hero-value .cur{font-size:22px;color:var(--muted);font-weight:500;}
  .hero-delta{
    display:inline-flex;align-items:center;gap:6px;margin-top:8px;
    font-size:13px;font-weight:600;padding:4px 10px;border-radius:999px;
  }
  .hero-delta.up{color:var(--primary);background:var(--primary-dim);}
  .hero-delta.down{color:var(--danger);background:var(--danger-dim);}
  .hero-stats{display:flex;gap:28px;position:relative;z-index:2;flex-wrap:wrap;}
  .hero-stat{text-align:right;}
  .hero-stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;}
  .hero-stat-value{font-family:var(--font-mono);font-size:18px;font-weight:600;margin-top:4px;}

  /* ===== GRID / CARDS ===== */
  .grid{display:grid;gap:18px;}
  .grid-4{grid-template-columns:repeat(4,1fr);}
  .grid-3{grid-template-columns:repeat(3,1fr);}
  .grid-2{grid-template-columns:repeat(2,1fr);}
  @media (max-width:1400px){.grid-4{grid-template-columns:repeat(2,1fr);} .grid-3{grid-template-columns:repeat(2,1fr);}}
  @media (max-width:900px){.grid-4,.grid-3,.grid-2{grid-template-columns:1fr;}}

  .card{
    background:var(--panel);
    border:1px solid var(--panel-border);
    border-radius:var(--radius);
    padding:20px;
    backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    transition:border-color .2s ease, transform .2s ease;
    position:relative;
  }
  .card:hover{border-color:rgba(255,255,255,0.16);}
  .card-title{font-size:13px;color:var(--muted);font-weight:600;display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .card-value{font-family:var(--font-mono);font-size:26px;font-weight:700;}
  .card-icon-badge{
    width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;
  }
  section{margin-bottom:28px;}
  .section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .section-title{font-family:var(--font-display);font-size:18px;font-weight:700;}
  .view{display:none;}
  .view.active{display:block;animation:fadeIn .3s ease;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

  .badge{padding:3px 9px;border-radius:999px;font-size:11px;font-weight:700;letter-spacing:0.3px;}
  .badge.success{background:var(--primary-dim);color:var(--primary);}
  .badge.danger{background:var(--danger-dim);color:var(--danger);}
  .badge.warn{background:var(--gold-dim);color:var(--gold);}
  .badge.info{background:var(--info-dim);color:var(--info);}
</style>
</head>

    },
    loans: [],         // [{id,type,principal,remaining,rate,months,monthlyPayment,startMonth}]
    achievements: [],
    goals: [],         // [{id,name,target,current,deadlineMonth}]
    history: []        // [{ts,simMonth,type,category,amount,currency,note,balanceAfter}]
  };
}

let DB = null;

function loadDB(){
  try{
    const raw = localStorage.getItem(DB_KEY);
    if(!raw){ DB = defaultDB(); saveDB(); return DB; }
    const parsed = JSON.parse(raw);
    DB = parsed;
    return DB;
  }catch(e){
    console.error('Błąd wczytywania bazy danych, tworzę nową.', e);
    DB = defaultDB();
    saveDB();
    return DB;
  }
}

function saveDB(){
  DB.lastSave = Date.now();
  localStorage.setItem(DB_KEY, JSON.stringify(DB));
}

function getUser(id){ return DB.users[id || DB.currentUserId]; }
function getCurrentUser(){ return DB.users[DB.currentUserId]; }

/* ---------- WALUTY ---------- */
function convertCurrency(amount, fromCur, toCur){
  if(fromCur === toCur) return amount;
  const plnAmount = amount / DB.fxRates[fromCur];
  return plnAmount * DB.fxRates[toCur];
}
function toDisplay(amountInPLN){
  return convertCurrency(amountInPLN, 'PLN', DB.displayCurrency);
}
function fmtMoney(amountInPLN, opts){
  opts = opts || {};
  const cur = opts.currency || DB.displayCurrency;
  const val = opts.alreadyConverted ? amountInPLN : convertCurrency(amountInPLN, 'PLN', cur);
  const sign = val < 0 ? '-' : (opts.forceSign ? '+' : '');
  const abs = Math.abs(val);
  const formatted = abs.toLocaleString('pl-PL', {minimumFractionDigits:2, maximumFractionDigits:2});
  return `${sign}${formatted} ${CURRENCY_SYMBOLS[cur]}`;
}
function fluctuateFxRates(){
  Object.keys(DB.fxRates).forEach(cur=>{
    if(cur === 'PLN') return;
    const base = BASE_FX_RATES[cur];
    const drift = (Math.random()-0.5) * 0.01;
    DB.fxRates[cur] = Math.max(base*0.85, Math.min(base*1.15, DB.fxRates[cur]*(1+drift)));
  });
}

/* ---------- SYNC STANU / TRANSAKCJE ---------- */
function pushNotification(message, kind){
  DB.notifications.unshift({
    id: 'n_'+Date.now()+'_'+Math.floor(Math.random()*9999),
    message, kind: kind || 'info', ts: Date.now(), read:false
  });
  if(DB.notifications.length > 100) DB.notifications.length = 100;
}

function addTransaction(userId, category, amountPLN, note, opts){
  opts = opts || {};
  const user = getUser(userId);
  const meta = CATEGORY_META[category] || CATEGORY_META.inne;
  const kind = opts.kind || meta.kind;
  const delta = kind === 'expense' ? -Math.abs(amountPLN) : Math.abs(amountPLN);
  const target = opts.targetField || 'balance';
  user[target] = round2(user[target] + delta);
  user.history.unshift({
    ts: Date.now(),
    simMonth: `${DB.simDate.year}-${String(DB.simDate.month+1).padStart(2,'0')}`,
    category, kind,
    amountPLN: delta,
    note: note || meta.label,
    balanceAfter: user.balance,
    savingsAfter: user.savings
  });
  if(user.history.length > 500) user.history.length = 500;
  return delta;
}

function round2(n){ return Math.round(n*100)/100; }

function transferBetweenUsers(fromId, toId, amountPLN, note){
  const from = getUser(fromId), to = getUser(toId);
  if(from.balance < amountPLN) return {ok:false, error:'Niewystarczające środki'};
  addTransaction(fromId, 'przelew_out', amountPLN, note || `Przelew do ${to.name}`);
  addTransaction(toId, 'przelew_in', amountPLN, note || `Przelew od ${from.name}`);
  saveDB();
  return {ok:true};
}

function transferToFamilyPool(userId, amountPLN, note){
  const user = getUser(userId);
  if(user.balance < amountPLN) return {ok:false, error:'Niewystarczające środki'};
  addTransaction(userId, 'przelew_out', amountPLN, note || 'Wpłata do puli rodzinnej');
  DB.familyPool.balance = round2(DB.familyPool.balance + amountPLN);
  DB.familyPool.history.unshift({ts:Date.now(), userId, amountPLN, note: note || 'Wpłata'});
  saveDB();
  return {ok:true};
}

function withdrawFromFamilyPool(userId, amountPLN, note){
  if(DB.familyPool.balance < amountPLN) return {ok:false, error:'Pula rodzinna ma za mało środków'};
  DB.familyPool.balance = round2(DB.familyPool.balance - amountPLN);
  addTransaction(userId, 'przelew_in', amountPLN, note || 'Wypłata z puli rodzinnej');
  DB.familyPool.history.unshift({ts:Date.now(), userId, amountPLN:-amountPLN, note: note || 'Wypłata'});
  saveDB();
  return {ok:true};
}

function calcNetWorth(user){
  let total = user.balance + user.savings;
  Object.entries(user.portfolio.crypto).forEach(([sym, qty])=>{
    const c = DB.market.crypto.find(x=>x.sym===sym);
    if(c) total += c.price * qty;
  });
  Object.entries(user.portfolio.stocks).forEach(([sym, qty])=>{
    const s = DB.market.stocks.find(x=>x.sym===sym);
    if(s) total += s.price * qty;
  });
  user.portfolio.realEstate.forEach(p => total += p.value - (p.mortgage || 0));
  user.portfolio.bonds.forEach(b => total += b.amount);
  user.portfolio.deposits.forEach(d => total += d.amount);
  user.portfolio.startups.forEach(s => { if(!s.resolved) total += s.invested; });
  total += user.portfolio.ppk;
  total += user.portfolio.goldOz * DB.market.commodities.gold.price;
  total += user.portfolio.oilBarrels * DB.market.commodities.oil.price;
  user.loans.forEach(l => total -= l.remaining);
  return round2(total);
}

function calcFamilyNetWorth(){
  return round2(Object.values(DB.users).reduce((sum,u)=> sum + calcNetWorth(u), 0) + DB.familyPool.balance);
}

/* Init przy pierwszym uruchomieniu */
loadDB();
</script>
